<script async src="https://www.googletagmanager.com/gtag/js?id=G-WGC55NWD1Z"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
margin: 0;
font-family: Arial, sans-serif;
height: 100vh;

background: radial-gradient(
circle at center,
#7B3FF2 0%,
#4A148C 50%,
#1A237E 100%
);

color: white;
}

.container {
height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 20px;
}

.logo {
width: 120px;
margin-bottom: 20px;
}

.title {
font-size: 46px;
font-weight: bold;
}

.tagline {
font-size: 20px;
margin-top: 10px;
}

.description {
margin-top: 18px;
max-width: 440px;
font-size: 16px;
}

.coming {
margin-top: 24px;
font-size: 22px;
font-weight: bold;
}

.email-form {
margin-top: 22px;
}

.email-form input {
padding: 12px;
width: 240px;
border-radius: 6px;
border: none;
outline: none;
}

.email-form button {
padding: 12px 16px;
border-radius: 6px;
border: none;
background: white;
color: #1A237E;
font-weight: bold;
cursor: pointer;
}

.email-form button:hover {
background: #e0e0e0;
}

.message {
margin-top: 12px;
font-size: 14px;
}

.social {
margin-top: 24px;
}

.social a {
margin: 0 10px;
font-size: 22px;
color: white;
}

.footer {
position: absolute;
bottom: 20px;
font-size: 13px;
}

.footer a {
color: white;
text-decoration: none;
margin: 0 6px;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.png"
class="logo"
alt="Truvyo Logo">

<div class="title">
Truvyo
</div>

<div class="tagline">
Trust Built by People
</div>

<div class="description">
A human-verified platform where real people share trusted experiences and businesses earn credibility.
</div>

<div class="coming">
🚀 Coming Soon
</div>

<!-- FORM -->

<div class="email-form">

<form id="emailForm">

<input
type="email"
name="email"
placeholder="Enter your email"
required>

<!--<br><br>

 OPTIONAL TERMS (you can remove if not needed) 

<label style="font-size:13px;">
<input type="checkbox" id="agreeTerms">
 I agree to Privacy Policy
</label>-->

<br><br>

<button
type="submit"
id="submitBtn">

Notify Me

</button>

<div id="formMessage"
class="message"></div>

</form>

</div>

<script>

document
.getElementById("emailForm")
.addEventListener("submit", async function(event) {

event.preventDefault();

var form = this;

var email =
form.querySelector('input[name="email"]').value;

var message =
document.getElementById("formMessage");

var button =
document.getElementById("submitBtn");


/* Disable Button */

button.innerHTML =
"⏳ Please wait...";

button.disabled = true;

/* STEP 1 — GOOGLE SHEETS */

try {

var response =
await fetch("https://script.google.com/macros/s/AKfycbzMXVz-IyyjHN48a6Az6qnpsCfFd68cBoIFRoiAJbfw8F6YeLqkzSNGwR7dHjzc5yqg/exec", {

method: "POST",

body: new URLSearchParams({
email: email
})

});

var result =
await response.text();

/* Duplicate Check */

if (result === "Duplicate") {

message.innerHTML =
"⚠️ Email already registered!";

button.innerHTML =
"Notify Me";

button.disabled = false;

return;

}

/* STEP 2 — FORMSPREE */

await fetch("https://formspree.io/f/xojywdpj", {

method: "POST",

headers: {
'Accept': 'application/json'
},

body: new FormData(form)

});

/* STEP 3 — SUCCESS */

message.innerHTML =
"✅ Successfully registered!";

gtag('event','email_signup');

/* Redirect */

setTimeout(function() {

window.location.href =
"/thankyou.html";

}, 1000);

}

catch(error) {

message.innerHTML =
"❌ Something went wrong";

button.innerHTML =
"Notify Me";

button.disabled = false;

}

});

</script>
