<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truvyo — Trust Built by People</title>

<meta name="description"
content="A human-verified platform where real people share trusted experiences. Join early access today.">

<link rel="icon" href="/favicon.png">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>

/* APP THEME BACKGROUND */

body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

background:
radial-gradient(circle at 18% 22%, rgba(123,63,242,0.30), transparent 42%),
radial-gradient(circle at 82% 76%, rgba(26,35,126,0.28), transparent 42%),
linear-gradient(180deg, #0f172a 0%, #1a237e 42%, #4a148c 100%);

background-size: 320% 320%;
animation: gradientMove 20s ease infinite;

color: #f5f5f7;
overflow-x: hidden;
}

body::before {
content: "";
position: fixed;
inset: 0;
background:
linear-gradient(180deg, rgba(0,0,0,0.24), rgba(0,0,0,0.46)),
radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 70%);
z-index: 0;
pointer-events: none;
}

body::after {
content: "";
position: fixed;
top: 50%;
left: 50%;
width: 760px;
height: 760px;
transform: translate(-50%, -50%);
background: radial-gradient(circle,
rgba(123,63,242,0.18),
rgba(26,35,126,0.08),
transparent 70%);
filter: blur(120px);
z-index: 0;
pointer-events: none;
}

@keyframes gradientMove {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

/* FLOATING ORBS */

.bg-orb {
position: fixed;
border-radius: 50%;
filter: blur(70px);
pointer-events: none;
z-index: 0;
opacity: 0.35;
mix-blend-mode: screen;
}

.orb-1 {
width: 220px;
height: 220px;
background: rgba(170, 90, 255, 0.28);
top: 12%;
left: 10%;
animation: floatOrb1 18s ease-in-out infinite;
}

.orb-2 {
width: 260px;
height: 260px;
background: rgba(70, 180, 255, 0.18);
bottom: 8%;
right: 10%;
animation: floatOrb2 22s ease-in-out infinite;
}

.orb-3 {
width: 180px;
height: 180px;
background: rgba(255, 210, 120, 0.14);
top: 58%;
left: 20%;
animation: floatOrb3 20s ease-in-out infinite;
}

@keyframes floatOrb1 {
0%,100% { transform: translate(0,0); }
50% { transform: translate(40px, -30px); }
}

@keyframes floatOrb2 {
0%,100% { transform: translate(0,0); }
50% { transform: translate(-35px, 35px); }
}

@keyframes floatOrb3 {
0%,100% { transform: translate(0,0); }
50% { transform: translate(28px, -20px); }
}

/* GRAIN */

.grain {
position: fixed;
inset: -50%;
z-index: 1;
pointer-events: none;
opacity: 0.05;
background-image:
radial-gradient(circle, rgba(255,255,255,0.25) 0.5px, transparent 0.6px);
background-size: 10px 10px;
animation: grainFloat 20s linear infinite;
mix-blend-mode: overlay;
}

@keyframes grainFloat {
0% { transform: translate(0, 0); }
25% { transform: translate(2%, -2%); }
50% { transform: translate(-2%, 2%); }
75% { transform: translate(1.5%, 1%); }
100% { transform: translate(0, 0); }
}

/* PARTICLES */

#particles-js {
position: fixed;
width: 100%;
height: 100%;
z-index: 0;
}

#particles-js canvas {
filter: blur(0.3px) brightness(1.18);
opacity: 0.95;
}

/* CONTAINER */

.container {
position: relative;
z-index: 2;
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 24px;
}

/* LOGO */

.logo {
width: 110px;
margin-bottom: 18px;
animation: floatLogo 5s ease-in-out infinite;
opacity: 0.96;
}

@keyframes floatLogo {
0% { transform: translateY(0px); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0px); }
}

/* TEXT */

.title {
font-size: 42px;
font-weight: 600;
letter-spacing: 0.5px;
}

.tagline {
font-size: 18px;
margin-top: 8px;
color: rgba(255,255,255,0.78);
}

.description {
margin-top: 14px;
max-width: 430px;
font-size: 15px;
line-height: 1.55;
color: rgba(255,255,255,0.68);
}

.coming {
margin-top: 22px;
font-size: 20px;
font-weight: 500;
}

.limited {
margin-top: 6px;
font-size: 13px;
color: #e6c76b;
font-weight: 600;
}

#waitlistCount {
margin-top: 8px;
font-size: 14px;
color: #e6c76b;
}

/* PROGRESS */

.progress-bar {
width: 240px;
height: 6px;
background: rgba(255,255,255,0.12);
border-radius: 999px;
margin-top: 10px;
overflow: hidden;
}

.progress-fill {
height: 100%;
width: 0%;
background: linear-gradient(90deg, #e6c76b, #caa94c);
transition: width 0.45s ease;
}

/* TRUST */

.trust-badges {
margin-top: 16px;
font-size: 13px;
color: rgba(255,255,255,0.74);
display: flex;
gap: 10px;
flex-wrap: wrap;
justify-content: center;
}

/* GLASS CARD */

.email-form {
position: relative;
overflow: hidden;

margin-top: 26px;

background: rgba(255,255,255,0.06);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);

border-radius: 20px;
padding: 26px;

border: 1px solid rgba(255,255,255,0.18);

box-shadow:
0 20px 60px rgba(0,0,0,0.45),
inset 0 1px 0 rgba(255,255,255,0.12);

transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.email-form:hover {
transform: translateY(-3px);
box-shadow:
0 24px 70px rgba(0,0,0,0.48),
inset 0 1px 0 rgba(255,255,255,0.14);
}

.email-form::before {
content: "";
position: absolute;
width: 240px;
height: 240px;
background: radial-gradient(circle, rgba(230,199,107,0.14), transparent 70%);
filter: blur(60px);
z-index: -1;
}

.email-form::after {
content: "";
position: absolute;
width: 220px;
height: 220px;
background: radial-gradient(circle, rgba(255,255,255,0.14), transparent 60%);
top: var(--y, 50%);
left: var(--x, 50%);
transform: translate(-50%, -50%);
pointer-events: none;
opacity: 0;
transition: opacity 0.3s ease;
}

.email-form:hover::after {
opacity: 1;
}

/* FORM */

.email-form input[type="email"] {
padding: 14px;
width: 260px;
border-radius: 10px;
border: 1px solid rgba(255,255,255,0.25);
background: rgba(255,255,255,0.12);
color: white;
font-size: 14px;
outline: none;
transition: border-color 0.25s ease, box-shadow 0.25s ease;
}

.email-form input[type="email"]:focus {
border-color: rgba(230,199,107,0.8);
box-shadow: 0 0 0 3px rgba(230,199,107,0.12);
}

.email-form input::placeholder {
color: rgba(255,255,255,0.65);
}

.email-form button {
position: relative;
overflow: hidden;
margin-top: 14px;
padding: 13px 22px;
border-radius: 10px;
border: none;
background: linear-gradient(45deg, #f5f5f7, #e6c76b);
color: #1a1a2e;
font-weight: 600;
font-size: 15px;
cursor: pointer;
transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
}

.email-form button:hover {
transform: scale(1.04);
box-shadow: 0 0 16px rgba(230,199,107,0.38);
}

.email-form button::after {
content: "";
position: absolute;
top: 0;
left: -100%;
width: 100%;
height: 100%;
background: linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.45),
transparent
);
transition: 0.6s;
}

.email-form button:hover::after {
left: 100%;
}

.email-form button:disabled {
cursor: not-allowed;
opacity: 0.9;
}

button.success {
background: linear-gradient(45deg, #4CAF50, #81C784);
color: white;
transform: scale(1.04);
box-shadow: 0 0 14px rgba(76,175,80,0.4);
}

/* SUCCESS */

.message {
margin-top: 12px;
font-size: 14px;
color: rgba(255,255,255,0.88);
line-height: 1.5;
}

.reveal {
opacity: 0;
transform: translateY(10px);
transition: all 0.4s ease;
}

.reveal.show {
opacity: 1;
transform: translateY(0);
}

.success-animate {
animation: successPulse 0.5s ease;
}

@keyframes successPulse {
0% { transform: scale(0.96); opacity: 0.6; }
100% { transform: scale(1); opacity: 1; }
}

.referral-box {
margin-top: 12px;
font-size: 13px;
color: #e6c76b;
display: none;
width: 100%;
}

.share-actions {
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
margin-top: 10px;
}

.share-actions button {
margin-top: 0;
padding: 10px 14px;
font-size: 14px;
border-radius: 9px;
}

.whatsapp-btn {
background: #25D366;
color: white;
display: none;
}

.copy-btn-inline {
background: linear-gradient(45deg,#ffffff,#e4e4e4);
color: #1a1a2e;
display: none;
}

/* FOOTER */

.footer {
margin-top: 40px;
font-size: 12px;
color: rgba(255,255,255,0.52);
text-align: center;
}

.footer a {
color: rgba(255,255,255,0.74);
text-decoration: none;
margin: 0 6px;
}

.footer a:hover {
color: #e6c76b;
}

.social-icons {
margin-top: 8px;
}

.social-icons a {
color: rgba(255,255,255,0.72);
margin: 0 6px;
font-size: 16px;
transition: 0.25s ease;
}

.social-icons a:hover {
color: #e6c76b;
transform: scale(1.15);
}

</style>

</head>

<body>

<div id="particles-js"></div>
<div class="grain"></div>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="container">

<img src="logo.png" class="logo" alt="Truvyo logo">

<div class="title">Truvyo</div>

<div class="tagline">Trust Built by People</div>

<div class="description">
A human-verified platform where real people share trusted experiences.
</div>

<div class="coming">🚀 Coming Soon</div>

<div class="limited">⚡ Only 100 Early Users</div>

<div id="waitlistCount">🔥 Loading waitlist count...</div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

<div class="trust-badges">
<span>✔ Human Verified</span>
<span>✔ No Fake Reviews</span>
<span>✔ Privacy First</span>
</div>

<div class="email-form">

<form id="emailForm">

<input
type="text"
name="website"
id="website"
style="display:none"
tabindex="-1"
autocomplete="off">

<input
type="email"
name="email"
placeholder="Enter your email"
required
autocomplete="email">

<br>

<button
type="submit"
id="submitBtn">
Notify Me
</button>

<div id="formMessage" class="message"></div>

<div id="referralBox" class="referral-box reveal"></div>

<div class="share-actions reveal" id="shareActions">
<button
type="button"
id="copyShareBtn"
class="copy-btn-inline">
📋 Copy Link
</button>

<button
type="button"
id="whatsappShare"
class="whatsapp-btn">
📲 Share on WhatsApp
</button>
</div>

</form>

</div>

<div class="footer">

© <span id="year"></span> Truvyo
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>

<div class="social-icons">
<a href="https://instagram.com/truvyoapp" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
<a href="https://x.com/truvyo" target="_blank" rel="noopener noreferrer"><i class="fab fa-x-twitter"></i></a>
<a href="https://linkedin.com/company/truvyo" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin"></i></a>
</div>

</div>

</div>

<script>

document.getElementById("year").textContent = new Date().getFullYear();

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxdzVEZEDKAm7EDCCE0iXCoR5ZEWtlFTNlfgtzMKLZaRrkPA3KSjQZp8Uom6swsr3LM/exec";

const MAX_USERS = 100;
let lastSubmitTime = 0;

/* particles with shine + lines */
particlesJS("particles-js", {
particles: {

number: { value: 28 },

color: {
value: ["#ffffff", "#e6c76b"]
},

shape: { type: "circle" },

opacity: {
value: 0.18,
random: true,
anim: {
enable: true,
speed: 0.6,
opacity_min: 0.05,
sync: false
}
},

size: {
value: 1.8,
random: true,
anim: {
enable: true,
speed: 1,
size_min: 0.8,
sync: false
}
},

move: {
enable: true,
speed: 0.25,
out_mode: "out"
},

line_linked: {
enable: true,
distance: 130,
color: "#ffffff",
opacity: 0.08,
width: 1
}

},
interactivity: {
detect_on: "canvas",
events: {
onhover: {
enable: true,
mode: "grab"
},
resize: true
},
modes: {
grab: {
distance: 120,
line_linked: {
opacity: 0.16
}
}
}
},
retina_detect: true
});

/* card hover glow tracking */
const card = document.querySelector(".email-form");

card.addEventListener("mousemove", (e) => {
const rect = card.getBoundingClientRect();
const x = e.clientX - rect.left;
const y = e.clientY - rect.top;
card.style.setProperty("--x", x + "px");
card.style.setProperty("--y", y + "px");
});

async function loadCount() {
try {
const response = await fetch(SCRIPT_URL);
const text = await response.text();

if (!isNaN(text)) {
const count = Number(text);

if (count >= MAX_USERS) {
document.getElementById("waitlistCount").innerHTML =
"🚫 Early access full — stay tuned!";
document.getElementById("submitBtn").disabled = true;
document.getElementById("progressFill").style.width = "100%";
return;
}

document.getElementById("waitlistCount").innerHTML =
"🔥 " + count + " of " + MAX_USERS + " early spots filled!";

const percent = (count / MAX_USERS) * 100;
document.getElementById("progressFill").style.width = percent + "%";
}
} catch (e) {
document.getElementById("waitlistCount").innerHTML =
"🔥 Join the waitlist today!";
}
}

loadCount();

function getReferral() {
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");

if (!ref || isNaN(ref)) {
return "";
}

return ref;
}

document
.getElementById("emailForm")
.addEventListener("submit", async function(event) {

event.preventDefault();

const message = document.getElementById("formMessage");
const button = document.getElementById("submitBtn");
const referralBox = document.getElementById("referralBox");
const whatsappBtn = document.getElementById("whatsappShare");
const copyShareBtn = document.getElementById("copyShareBtn");
const shareActions = document.getElementById("shareActions");
const honeypot = document.getElementById("website").value;
const email = this.querySelector('input[name="email"]').value.trim();

if (Date.now() - lastSubmitTime < 5000) {
message.innerHTML = "⏳ Please wait a few seconds";
return;
}
lastSubmitTime = Date.now();

if (honeypot !== "") {
message.innerHTML = "❌ Spam detected";
return;
}

const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if (!emailPattern.test(email)) {
message.innerHTML = "⚠️ Enter a valid email";
return;
}

button.innerHTML = "⏳ Please wait...";
button.disabled = true;

try {

const response = await fetch(SCRIPT_URL, {
method: "POST",
body: new URLSearchParams({
email: email,
ref: getReferral()
})
});

const result = await response.text();

if (result === "Duplicate") {
message.innerHTML = "⚠️ Email already registered!";
button.innerHTML = "Notify Me";
button.disabled = false;
return;
}

if (isNaN(result)) {
message.innerHTML = "❌ Server error — try again";
button.innerHTML = "Notify Me";
button.disabled = false;
return;
}

message.innerHTML =
"🎉 You're #" + result + " on the waitlist!<br>" +
"🏅 You're now part of our first 100 early members.";

message.classList.remove("success-animate");
void message.offsetWidth;
message.classList.add("success-animate");

button.classList.add("success");
button.innerHTML = "✅ Joined";

const referralLink =
window.location.origin +
window.location.pathname +
"?ref=" +
result;

referralBox.style.display = "block";
referralBox.innerHTML =
"🔗 Your invite link is ready:<br>" +
"<input id='refLinkBox' " +
"style='width:100%;padding:8px;border-radius:8px;border:none;margin-top:6px;background:rgba(255,255,255,0.95);color:#121226;' " +
"value='" + referralLink + "' readonly>";

setTimeout(() => {
referralBox.classList.add("show");
}, 100);

copyShareBtn.style.display = "inline-block";
whatsappBtn.style.display = "inline-block";

setTimeout(() => {
shareActions.classList.add("show");
}, 200);

copyShareBtn.onclick = function() {
navigator.clipboard.writeText(referralLink);
copyShareBtn.innerHTML = "✅ Copied!";
setTimeout(() => {
copyShareBtn.innerHTML = "📋 Copy Link";
}, 1800);
};

whatsappBtn.onclick = function() {
const msg =
"🚀 I just joined Truvyo — a platform built on trusted experiences.\n\n" +
"🔥 Only first 100 users get early access.\n\n" +
"Join before spots fill 👇\n" +
referralLink;

const url =
"https://wa.me/?text=" +
encodeURIComponent(msg);

window.open(url, "_blank");
};

this.reset();
loadCount();

setTimeout(() => {
button.classList.remove("success");
button.innerHTML = "Notify Me";
button.disabled = false;
}, 2500);

} catch (error) {
message.innerHTML = "❌ Something went wrong";
button.innerHTML = "Notify Me";
button.disabled = false;
}

});

</script>

</body>
</html>
