<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Truvyo</title>
<meta name="description" content="Search before you trust.">

<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

/* ===== BACKGROUND ===== */

body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
color: white;
overflow: hidden;

background:
radial-gradient(circle at 30% 40%, rgba(123,63,242,0.25), transparent 35%),
radial-gradient(circle at 70% 30%, rgba(0,220,255,0.15), transparent 30%),
linear-gradient(180deg,#15164a,#23165f,#121a45);

animation: bgFlow 18s ease infinite;
}

@keyframes bgFlow {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

/* ===== DEPTH LAYER ===== */

body::after {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
z-index: 1;
box-shadow:
  inset 0 0 80px rgba(0,0,0,0.35),
  inset 0 0 160px rgba(0,0,0,0.25);
}

/* ===== INSANE EDGE GLOW ===== */

.edge-glow {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 2;
overflow: hidden;
}

.edge-glow::before {
content: "";
position: absolute;
inset: -6px;

background: linear-gradient(
120deg,
#8FEFFF,
#8B5CFF,
#FF4FD8,
#8FEFFF
);

background-size: 400% 400%;

filter: blur(22px);
opacity: 0.75;

box-shadow:
0 0 40px rgba(143,239,255,0.4),
0 0 80px rgba(139,92,255,0.35),
0 0 120px rgba(255,79,216,0.25);

animation: flowingEdge 5s linear infinite;

padding: 8px;

-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite: xor;
mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
mask-composite: exclude;
}

.edge-glow::after {
content: "";
position: absolute;
width: 300px;
height: 300px;
left: var(--mouse-x, 50%);
top: var(--mouse-y, 30%);
transform: translate(-50%, -50%);
background: radial-gradient(circle, rgba(143,239,255,0.35), transparent 65%);
filter: blur(24px);
opacity: 0.9;
transition: 0.08s ease;
}

@keyframes flowingEdge {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

/* ===== PARTICLES ===== */

#particles-js {
position: fixed;
width: 100%;
height: 100%;
z-index: 0;
}

/* ===== LAYOUT ===== */

.container {
position: relative;
z-index: 3;
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding:
calc(20px + env(safe-area-inset-top))
20px
calc(20px + env(safe-area-inset-bottom));
}

/* ===== LOGO ===== */

.logo {
width: 90px;
animation: floatLogo 5s ease-in-out infinite;
}

@keyframes floatLogo {
0% { transform: translateY(0); }
50% { transform: translateY(-8px); }
100% { transform: translateY(0); }
}

/* ===== TITLE ===== */

.title {
font-size: clamp(36px,5vw,52px);
font-weight: 800;
background: linear-gradient(90deg,#fff,#bfa8ff,#8FEFFF,#fff);
background-size: 250%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
animation: shine 6s linear infinite;
}

@keyframes shine {
0% { background-position: 0% }
100% { background-position: 250% }
}

/* ===== TEXT ===== */

.tagline { font-size: 18px; opacity: 0.9; }
.description { margin-top: 10px; opacity: 0.7; }
.coming { margin-top: 18px; font-size: 20px; }

#waitlistCount {
margin-top: 6px;
font-size: 14px;
color: #8FEFFF;
}

/* ===== FORM ===== */

.email-form {
margin-top: 20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(16px);
border-radius: 18px;
padding: 24px;
border: 1px solid rgba(255,255,255,0.15);
box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

.email-form input {
padding: 12px;
width: 240px;
border-radius: 10px;
border: none;
background: rgba(255,255,255,0.15);
color: white;
}

.email-form button {
margin-top: 12px;
padding: 12px 20px;
border-radius: 10px;
border: none;
background: linear-gradient(45deg,#fff,#8FEFFF);
color: #111;
font-weight: bold;
cursor: pointer;
}

/* ===== FOOTER ===== */

.footer {
margin-top: 20px;
font-size: 12px;
opacity: 0.6;
}

.social-icons {
margin-top: 8px;
display: flex;
gap: 14px;
justify-content: center;
}

/* ===== MOBILE ===== */

@media (max-width: 768px) {

.edge-glow::before {
opacity: 0.55;
filter: blur(16px);
}

.edge-glow::after {
width: 180px;
height: 180px;
opacity: 0.4;
}

.email-form {
width: calc(100% - 40px);
}

}

/* ===== REDUCED MOTION ===== */

@media (prefers-reduced-motion: reduce) {
* {
animation: none !important;
transition: none !important;
}
}

</style>
</head>

<body>

<div id="particles-js"></div>
<div class="edge-glow"></div>

<div class="container">

<img src="logo.png" class="logo">

<h1 class="title">Truvyo</h1>
<p class="tagline">Search before you trust.</p>
<p class="description">Some people already search before they trust.</p>

<div class="coming">🚀 Coming Soon</div>

<div id="waitlistCount">Loading...</div>

<div class="email-form">
<form id="emailForm">
<input type="email" name="email" placeholder="Get early access" required><br>
<button type="submit">Join Waitlist</button>
<div id="formMessage"></div>
</form>
</div>

<div class="footer">
© 2026 Truvyo
<div class="social-icons">
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-x-twitter"></i></a>
<a href="#"><i class="fab fa-linkedin"></i></a>
</div>
</div>

</div>

<script>

particlesJS("particles-js", {
particles: {
number: { value: window.innerWidth < 768 ? 20 : 40 },
size: { value: 2 },
move: { speed: 0.3 }
}
});

const isTouch = window.matchMedia("(pointer: coarse)").matches;

if (!isTouch) {
document.addEventListener("mousemove", e => {
document.documentElement.style.setProperty("--mouse-x", e.clientX + "px");
document.documentElement.style.setProperty("--mouse-y", e.clientY + "px");
});
} else {
document.documentElement.style.setProperty("--mouse-x", "50%");
document.documentElement.style.setProperty("--mouse-y", "30%");
}

</script>

</body>
</html>
