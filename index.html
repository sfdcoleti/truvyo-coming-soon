<style>

/* Body */

body {

margin: 0;
font-family: Arial, sans-serif;

height: 100vh;

background: radial-gradient(
circle at center,
#7B3FF2 0%,
#4A148C 50%,
#1A237E 100%
);

color: white;

}

/* Container */

.container {

height: 100vh;

display: flex;
flex-direction: column;

justify-content: center;
align-items: center;

text-align: center;

padding: 20px;

}

/* Logo */

.logo {

width: 120px;
margin-bottom: 20px;

}

/* Title */

.title {

font-size: 46px;
font-weight: bold;

}

/* Tagline */

.tagline {

font-size: 20px;
margin-top: 10px;

}

/* Description */

.description {

margin-top: 18px;

max-width: 440px;

font-size: 16px;

}

/* Coming Soon */

.coming {

margin-top: 24px;

font-size: 22px;

font-weight: bold;

}

/* Email Form */

.email-form {

margin-top: 22px;

}

.email-form input {

padding: 12px;

width: 240px;

border-radius: 6px;

border: none;

outline: none;

}

.email-form input:focus {

box-shadow: 0 0 0 2px #7B3FF2;

}

.email-form button {

padding: 12px 16px;

border-radius: 6px;

border: none;

background: white;

color: #1A237E;

font-weight: bold;

cursor: pointer;

}

.email-form button:hover {

background: #e0e0e0;

}

/* Social Icons */

.social {

margin-top: 24px;

}

.social a {

margin: 0 10px;

font-size: 22px;

color: white;

transition: 0.3s;

}

.social a:hover {

color: #ffd54f;

}

/* Contact */

.contact {

margin-top: 18px;

font-size: 14px;

}

/* Footer */

.footer {

position: absolute;

bottom: 20px;

font-size: 13px;

}

.footer a {

color: white;

text-decoration: none;

}

.footer a:hover {

text-decoration: underline;

}

/* Mobile Optimization */

@media (max-width: 480px) {

.title {

font-size: 32px;

}

.tagline {

font-size: 16px;

}

.email-form input {

width: 200px;

}

}

</style>

</head>

<div class="container">

Notify Me

</form>

</div>
