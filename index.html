<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Truvyo — Trust Built by People</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;

    background: radial-gradient(
        circle at center,
        #7B3FF2 0%,
        #4A148C 50%,
        #1A237E 100%
    );

    color: white;
}

.container {
    height: 100vh;

    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;

    text-align: center;

    padding: 20px;
}

.logo {
    width: 120px;
    margin-bottom: 20px;
}

.title {
    font-size: 46px;
    font-weight: bold;
}

.tagline {
    font-size: 20px;
    margin-top: 10px;
}

.description {
    margin-top: 18px;
    max-width: 420px;
    font-size: 16px;
}

.coming {
    margin-top: 25px;
    font-size: 22px;
    font-weight: bold;
}

.email {
    margin-top: 20px;
    font-size: 15px;
}

.footer {
    position: absolute;
    bottom: 20px;
    font-size: 13px;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="title">
Truvyo
</div>

<div class="tagline">
Trust Built by People
</div>

<div class="description">
A human-verified platform where real people share trusted experiences and businesses earn credibility.
</div>

<div class="coming">
🚀 Coming Soon
</div>

<div class="email">
Contact: hello@truvyo.app
</div>

</div>

<div class="footer">
© 2026 Truvyo
</div>

</body>
</html>
