<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truvyo — Trust Built by People</title>
<meta name="description" content="A human-verified platform where real people share trusted experiences. Join early access today.">

<link rel="icon" href="/favicon.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>

body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
color: white;
overflow-x: hidden;

background:
radial-gradient(circle at 35% 42%, rgba(255, 0, 220, 0.28), transparent 30%),
radial-gradient(circle at 62% 35%, rgba(0, 240, 255, 0.32), transparent 28%),
radial-gradient(circle at 50% 60%, rgba(123, 63, 242, 0.45), transparent 38%),
linear-gradient(180deg, #02030a 0%, #090b24 45%, #050515 100%);

background-size: 180% 180%;
animation: bgFlow 18s ease infinite;
}

@keyframes bgFlow {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

/* Neon wave layers */

.wave {
position: fixed;
inset: 0;
z-index: 0;
pointer-events: none;
overflow: hidden;
}

.wave::before,
.wave::after {
content: "";
position: absolute;
width: 120%;
height: 120%;
left: -10%;
top: -10%;
background:
radial-gradient(ellipse at center, transparent 35%, rgba(255,0,220,0.16) 42%, transparent 55%),
radial-gradient(ellipse at center, transparent 40%, rgba(0,240,255,0.14) 48%, transparent 62%);
filter: blur(45px);
animation: waveMove 14s ease-in-out infinite;
}

.wave::after {
animation-delay: -7s;
transform: rotate(25deg);
opacity: 0.75;
}

@keyframes waveMove {
0% { transform: translateX(-4%) translateY(2%) rotate(0deg) scale(1); }
50% { transform: translateX(4%) translateY(-3%) rotate(12deg) scale(1.08); }
100% { transform: translateX(-4%) translateY(2%) rotate(0deg) scale(1); }
}

/* Soft grain */

.grain {
position: fixed;
inset: -50%;
z-index: 1;
pointer-events: none;
opacity: 0.06;
background-image:
radial-gradient(circle, rgba(255,255,255,0.25) 0.5px, transparent 0.6px);
background-size: 10px 10px;
animation: grainFloat 20s linear infinite;
mix-blend-mode: overlay;
}

@keyframes grainFloat {
0% { transform: translate(0,0); }
50% { transform: translate(-2%,2%); }
100% { transform: translate(0,0); }
}

#particles-js {
position: fixed;
width: 100%;
height: 100%;
z-index: 1;
}

#particles-js canvas {
filter: blur(0.15px) brightness(1.35);
opacity: 1;
}

.container {
position: relative;
z-index: 2;
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 24px;
}

.logo {
width: 110px;
margin-bottom: 18px;
animation: floatLogo 5s ease-in-out infinite;
filter: drop-shadow(0 0 22px rgba(0,240,255,0.35));
}

@keyframes floatLogo {
0% { transform: translateY(0); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0); }
}

.title {
font-size: 44px;
font-weight: 700;
letter-spacing: 0.5px;
}

.tagline {
font-size: 18px;
margin-top: 8px;
color: rgba(255,255,255,0.82);
}

.description {
margin-top: 14px;
max-width: 430px;
font-size: 15px;
line-height: 1.55;
color: rgba(255,255,255,0.72);
}

.coming {
margin-top: 22px;
font-size: 21px;
font-weight: 600;
}

.limited,
#waitlistCount {
margin-top: 8px;
font-size: 14px;
color: #7efcff;
font-weight: 600;
}

.progress-bar {
width: 250px;
height: 7px;
background: rgba(255,255,255,0.12);
border-radius: 999px;
margin-top: 10px;
overflow: hidden;
}

.progress-fill {
height: 100%;
width: 0%;
background: linear-gradient(90deg, #ff2eea, #00f0ff);
box-shadow: 0 0 14px rgba(0,240,255,0.65);
transition: width 0.45s ease;
}

.trust-badges {
margin-top: 16px;
font-size: 13px;
color: rgba(255,255,255,0.78);
display: flex;
gap: 10px;
flex-wrap: wrap;
justify-content: center;
}

.email-form {
position: relative;
overflow: hidden;
margin-top: 26px;
background: rgba(255,255,255,0.075);
backdrop-filter: blur(22px);
-webkit-backdrop-filter: blur(22px);
border-radius: 22px;
padding: 28px;
border: 1px solid rgba(255,255,255,0.16);
box-shadow:
0 24px 70px rgba(0,0,0,0.48),
0 0 35px rgba(0,240,255,0.12),
inset 0 1px 0 rgba(255,255,255,0.14);
transition: 0.3s ease;
}

.email-form:hover {
transform: translateY(-3px);
box-shadow:
0 28px 80px rgba(0,0,0,0.52),
0 0 42px rgba(255,0,220,0.16),
inset 0 1px 0 rgba(255,255,255,0.16);
}

.email-form::after {
content: "";
position: absolute;
width: 220px;
height: 220px;
background: radial-gradient(circle, rgba(0,240,255,0.18), transparent 60%);
top: var(--y, 50%);
left: var(--x, 50%);
transform: translate(-50%, -50%);
pointer-events: none;
opacity: 0;
transition: opacity 0.3s ease;
}

.email-form:hover::after {
opacity: 1;
}

.email-form input[type="email"] {
padding: 14px;
width: 260px;
border-radius: 12px;
border: 1px solid rgba(255,255,255,0.28);
background: rgba(255,255,255,0.12);
color: white;
font-size: 14px;
outline: none;
}

.email-form input[type="email"]:focus {
border-color: rgba(0,240,255,0.85);
box-shadow: 0 0 0 3px rgba(0,240,255,0.16);
}

.email-form input::placeholder {
color: rgba(255,255,255,0.66);
}

.email-form button {
position: relative;
overflow: hidden;
margin-top: 14px;
padding: 13px 24px;
border-radius: 12px;
border: none;
background: linear-gradient(45deg, #ffffff, #7efcff);
color: #10142a;
font-weight: 700;
font-size: 15px;
cursor: pointer;
transition: 0.25s ease;
}

.email-form button:hover {
transform: scale(1.04);
box-shadow: 0 0 20px rgba(0,240,255,0.55);
}

.email-form button::after {
content: "";
position: absolute;
top: 0;
left: -100%;
width: 100%;
height: 100%;
background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
transition: 0.6s;
}

.email-form button:hover::after {
left: 100%;
}

button.success {
background: linear-gradient(45deg, #00c853, #81f7d8);
color: white;
}

.message {
margin-top: 12px;
font-size: 14px;
color: rgba(255,255,255,0.9);
line-height: 1.5;
}

.reveal {
opacity: 0;
transform: translateY(10px);
transition: all 0.4s ease;
}

.reveal.show {
opacity: 1;
transform: translateY(0);
}

.success-animate {
animation: successPulse 0.5s ease;
}

@keyframes successPulse {
0% { transform: scale(0.96); opacity: 0.6; }
100% { transform: scale(1); opacity: 1; }
}

.referral-box {
margin-top: 12px;
font-size: 13px;
color: #7efcff;
display: none;
width: 100%;
}

.share-actions {
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
margin-top: 10px;
}

.share-actions button {
margin-top: 0;
padding: 10px 14px;
font-size: 14px;
border-radius: 9px;
}

.whatsapp-btn {
background: #25D366;
color: white;
display: none;
}

.copy-btn-inline {
background: linear-gradient(45deg,#ffffff,#e4e4e4);
color: #10142a;
display: none;
}

.footer {
margin-top: 40px;
font-size: 12px;
color: rgba(255,255,255,0.58);
text-align: center;
}

.footer a {
color: rgba(255,255,255,0.78);
text-decoration: none;
margin: 0 6px;
}

.footer a:hover {
color: #7efcff;
}

.social-icons {
margin-top: 8px;
}

.social-icons a {
color: rgba(255,255,255,0.76);
margin: 0 6px;
font-size: 16px;
transition: 0.25s ease;
}

.social-icons a:hover {
color: #7efcff;
transform: scale(1.15);
}

</style>
</head>

<body>

<div id="particles-js"></div>
<div class="wave"></div>
<div class="grain"></div>

<div class="container">

<img src="logo.png" class="logo" alt="Truvyo logo">

<div class="title">Truvyo</div>
<div class="tagline">Trust Built by People</div>

<div class="description">
A human-verified platform where real people share trusted experiences.
</div>

<div class="coming">🚀 Coming Soon</div>
<div class="limited">⚡ Only 100 Early Users</div>
<div id="waitlistCount">🔥 Loading waitlist count...</div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

<div class="trust-badges">
<span>✔ Human Verified</span>
<span>✔ No Fake Reviews</span>
<span>✔ Privacy First</span>
</div>

<div class="email-form">

<form id="emailForm">

<input type="text" name="website" id="website" style="display:none" tabindex="-1" autocomplete="off">

<input type="email" name="email" placeholder="Enter your email" required autocomplete="email">

<br>

<button type="submit" id="submitBtn">Notify Me</button>

<div id="formMessage" class="message"></div>
<div id="referralBox" class="referral-box reveal"></div>

<div class="share-actions reveal" id="shareActions">
<button type="button" id="copyShareBtn" class="copy-btn-inline">📋 Copy Link</button>
<button type="button" id="whatsappShare" class="whatsapp-btn">📲 Share on WhatsApp</button>
</div>

</form>

</div>

<div class="footer">
© <span id="year"></span> Truvyo
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>

<div class="social-icons">
<a href="https://instagram.com/truvyoapp" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
<a href="https://x.com/truvyo" target="_blank" rel="noopener noreferrer"><i class="fab fa-x-twitter"></i></a>
<a href="https://linkedin.com/company/truvyo" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin"></i></a>
</div>
</div>

</div>

<script>

document.getElementById("year").textContent = new Date().getFullYear();

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxdzVEZEDKAm7EDCCE0iXCoR5ZEWtlFTNlfgtzMKLZaRrkPA3KSjQZp8Uom6swsr3LM/exec";

const MAX_USERS = 100;
let lastSubmitTime = 0;

particlesJS("particles-js", {
particles: {
number: { value: 46 },
color: { value: ["#ffffff", "#00f0ff", "#ff2eea"] },
shape: { type: "circle" },
opacity: {
value: 0.42,
random: true,
anim: {
enable: true,
speed: 0.9,
opacity_min: 0.14,
sync: false
}
},
size: {
value: 3,
random: true,
anim: {
enable: true,
speed: 1.3,
size_min: 1.2,
sync: false
}
},
move: {
enable: true,
speed: 0.38,
out_mode: "out"
},
line_linked: {
enable: true,
distance: 150,
color: "#ffffff",
opacity: 0.24,
width: 1.2
}
},
interactivity: {
detect_on: "canvas",
events: {
onhover: {
enable: true,
mode: "grab"
},
resize: true
},
modes: {
grab: {
distance: 155,
line_linked: {
opacity: 0.42
}
}
}
},
retina_detect: true
});

const card = document.querySelector(".email-form");

card.addEventListener("mousemove", (e) => {
const rect = card.getBoundingClientRect();
card.style.setProperty("--x", e.clientX - rect.left + "px");
card.style.setProperty("--y", e.clientY - rect.top + "px");
});

async function loadCount() {
try {
const response = await fetch(SCRIPT_URL);
const text = await response.text();

if (!isNaN(text)) {
const count = Number(text);

if (count >= MAX_USERS) {
document.getElementById("waitlistCount").innerHTML =
"🚫 Early access full — stay tuned!";
document.getElementById("submitBtn").disabled = true;
document.getElementById("progressFill").style.width = "100%";
return;
}

document.getElementById("waitlistCount").innerHTML =
"🔥 " + count + " of " + MAX_USERS + " early spots filled!";

document.getElementById("progressFill").style.width =
(count / MAX_USERS) * 100 + "%";
}
} catch (e) {
document.getElementById("waitlistCount").innerHTML =
"🔥 Join the waitlist today!";
}
}

loadCount();

function getReferral() {
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");
return (!ref || isNaN(ref)) ? "" : ref;
}

document.getElementById("emailForm").addEventListener("submit", async function(event) {

event.preventDefault();

const message = document.getElementById("formMessage");
const button = document.getElementById("submitBtn");
const referralBox = document.getElementById("referralBox");
const whatsappBtn = document.getElementById("whatsappShare");
const copyShareBtn = document.getElementById("copyShareBtn");
const shareActions = document.getElementById("shareActions");
const honeypot = document.getElementById("website").value;
const email = this.querySelector('input[name="email"]').value.trim();

if (Date.now() - lastSubmitTime < 5000) {
message.innerHTML = "⏳ Please wait a few seconds";
return;
}

lastSubmitTime = Date.now();

if (honeypot !== "") {
message.innerHTML = "❌ Spam detected";
return;
}

const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if (!emailPattern.test(email)) {
message.innerHTML = "⚠️ Enter a valid email";
return;
}

button.innerHTML = "⏳ Please wait...";
button.disabled = true;

try {

const response = await fetch(SCRIPT_URL, {
method: "POST",
body: new URLSearchParams({
email: email,
ref: getReferral()
})
});

const result = await response.text();

if (result === "Duplicate") {
message.innerHTML = "⚠️ Email already registered!";
button.innerHTML = "Notify Me";
button.disabled = false;
return;
}

if (isNaN(result)) {
message.innerHTML = "❌ Server error — try again";
button.innerHTML = "Notify Me";
button.disabled = false;
return;
}

message.innerHTML =
"🎉 You're #" + result + " on the waitlist!<br>" +
"🏅 You're now part of our first 100 early members.";

message.classList.remove("success-animate");
void message.offsetWidth;
message.classList.add("success-animate");

button.classList.add("success");
button.innerHTML = "✅ Joined";

const referralLink =
window.location.origin +
window.location.pathname +
"?ref=" +
result;

referralBox.style.display = "block";
referralBox.innerHTML =
"🔗 Your invite link is ready:<br>" +
"<input id='refLinkBox' " +
"style='width:100%;padding:8px;border-radius:8px;border:none;margin-top:6px;background:rgba(255,255,255,0.95);color:#121226;' " +
"value='" + referralLink + "' readonly>";

setTimeout(() => {
referralBox.classList.add("show");
}, 100);

copyShareBtn.style.display = "inline-block";
whatsappBtn.style.display = "inline-block";

setTimeout(() => {
shareActions.classList.add("show");
}, 200);

copyShareBtn.onclick = function() {
navigator.clipboard.writeText(referralLink);
copyShareBtn.innerHTML = "✅ Copied!";
setTimeout(() => {
copyShareBtn.innerHTML = "📋 Copy Link";
}, 1800);
};

whatsappBtn.onclick = function() {
const msg =
"🚀 I just joined Truvyo — a platform built on trusted experiences.\n\n" +
"🔥 Only first 100 users get early access.\n\n" +
"Join before spots fill 👇\n" +
referralLink;

const url =
"https://wa.me/?text=" +
encodeURIComponent(msg);

window.open(url, "_blank");
};

this.reset();
loadCount();

setTimeout(() => {
button.classList.remove("success");
button.innerHTML = "Notify Me";
button.disabled = false;
}, 2500);

} catch (error) {
message.innerHTML = "❌ Something went wrong";
button.innerHTML = "Notify Me";
button.disabled = false;
}

});

</script>

</body>
</html>
