<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Truvyo — Coming Soon</title>

<style>
:root {
  --bg:#05030a;
  --text:#f6f1ff;
  --muted:rgba(255,255,255,0.6);
  --pink:#ff4fd8;
  --violet:#a855ff;
  --cyan:#8befff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Inter,system-ui;
  background:radial-gradient(circle at top,#1a0d2b,#05030a);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* Glow border */
.edge{
  position:fixed;
  inset:0;
  pointer-events:none;
  box-shadow:inset 0 0 40px rgba(168,85,255,0.5);
}

/* Container */
.container{
  max-width:420px;
  width:100%;
  background:rgba(20,10,30,0.8);
  border-radius:30px;
  padding:30px 20px;
  text-align:center;
  backdrop-filter:blur(20px);
  box-shadow:0 0 60px rgba(0,0,0,0.7);
}

/* Logo */
.logo{
  width:60px;
  height:60px;
  margin:0 auto 40px;
  border-radius:16px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 30px rgba(168,85,255,0.8);
  animation:float 4s infinite ease-in-out;
}

.logo img{
  width:40px;
  height:40px;
  object-fit:contain;
  filter:drop-shadow(0 0 12px rgba(139,239,255,0.8));
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* Headline */
h1{
  font-size:42px;
  font-family:Georgia;
  font-style:italic;
  margin-bottom:10px;
}

h1 span{
  background:linear-gradient(90deg,#fff,#b986ff,#ff4fd8);
  -webkit-background-clip:text;
  color:transparent;
}

/* Subtext */
.sub{
  font-size:14px;
  color:var(--muted);
  margin-bottom:20px;
}

/* Watching */
.watch{
  font-size:12px;
  color:var(--muted);
  margin-bottom:20px;
}

/* Card */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
}

/* Input */
input{
  width:100%;
  height:50px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
  padding:10px;
  background:rgba(255,255,255,0.08);
  color:white;
}

/* Button */
button{
  width:100%;
  height:50px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#fff,#cbefff);
  font-weight:bold;
  cursor:pointer;
}

/* Status */
.status{
  margin-top:10px;
  font-size:12px;
  color:#7cffc7;
}

/* Footer */
.footer{
  margin-top:20px;
  font-size:10px;
  color:rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<div class="edge"></div>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png" alt="Truvyo logo">
  </div>

  <!-- HEADLINE -->
  <h1>
    You weren’t
    <span>supposed to find this.</span>
  </h1>

  <p class="sub">
    But here you are.<br>
    The rest unlocks soon.
  </p>

  <div class="watch" id="watch">7 others viewing</div>

  <!-- CARD -->
  <div class="card">
    <p>27 / 100 spots filled</p>

    <input type="email" id="email" placeholder="you@email.com">

    <button onclick="submitForm()">Request Invite →</button>

    <div class="status" id="status"></div>
  </div>

  <div class="footer">
    Real people. Private by default.
  </div>

</div>

<script>
function submitForm(){
  const status = document.getElementById("status");

  const steps=[
    "Checking access...",
    "Verifying...",
    "Reserving your spot...",
    "You're early. #028"
  ];

  let i=0;
  const interval=setInterval(()=>{
    status.innerText=steps[i];
    i++;
    if(i===steps.length){
      clearInterval(interval);
    }
  },800);
}

// fake live watchers
setInterval(()=>{
  const val = Math.floor(Math.random()*4)+6;
  document.getElementById("watch").innerText = val + " others viewing";
},3000);
</script>

</body>
</html>
