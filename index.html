<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truvyo — Trust Built by People</title>

<meta name="description"
content="A human-verified platform where real people share trusted experiences. Join early access today.">

<link rel="icon" href="/favicon.png">

<!-- Font Awesome Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Particles -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>

/* Background */

body {

margin: 0;
font-family: Arial, sans-serif;

background: linear-gradient(
270deg,
#7B3FF2,
#4A148C,
#1A237E
);

background-size: 600% 600%;

animation: gradientMove 15s ease infinite;

color: white;

overflow-x: hidden;

}

@keyframes gradientMove {

0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }

}

/* Particles */

#particles-js {

position: fixed;

width: 100%;
height: 100%;

z-index: 0;

}

/* Layout */

.container {

position: relative;

z-index: 1;

min-height: 100vh;

display: flex;

flex-direction: column;

justify-content: center;

align-items: center;

text-align: center;

padding: 20px;

}

/* Logo */

.logo {

width: 120px;

margin-bottom: 20px;

animation: floatLogo 4s ease-in-out infinite;

}

@keyframes floatLogo {

0% { transform: translateY(0px); }
50% { transform: translateY(-12px); }
100% { transform: translateY(0px); }

}

/* Text */

.title {

font-size: 46px;
font-weight: bold;

}

.tagline {

font-size: 20px;
margin-top: 10px;

}

.description {

margin-top: 18px;

max-width: 440px;

}

.coming {

margin-top: 24px;

font-size: 22px;

font-weight: bold;

}

/* Waitlist Counter */

#waitlistCount {

margin-top: 8px;

font-size: 15px;

color: #FFD700;

}

/* Glass Card */

.email-form {

margin-top: 26px;

background: rgba(255,255,255,0.1);

backdrop-filter: blur(12px);

border-radius: 14px;

padding: 24px;

box-shadow:
0 8px 32px rgba(0,0,0,0.25);

}

/* Input */

.email-form input {

padding: 12px;

width: 240px;

border-radius: 8px;

border: 1px solid rgba(255,255,255,0.3);

background: rgba(255,255,255,0.15);

color: white;

}

/* Button */

.email-form button {

margin-top: 14px;

padding: 12px 18px;

border-radius: 8px;

border: none;

background: linear-gradient(
45deg,
#ffffff,
#dcdcdc
);

color: #1A237E;

font-weight: bold;

cursor: pointer;

transition: 0.3s;

}

.email-form button:hover {

transform: scale(1.05);

box-shadow:
0 0 15px rgba(255,255,255,0.6);

}

/* Messages */

.message {

margin-top: 10px;

font-size: 14px;

}

.referral-box {

margin-top: 10px;

font-size: 13px;

color: #FFD700;

display: none;

width: 100%;

}

.whatsapp-btn {

margin-top: 10px;

padding: 10px 16px;

border-radius: 8px;

border: none;

background: #25D366;

color: white;

font-weight: bold;

cursor: pointer;

display: none;

}

/* Footer */

.footer {

margin-top: 40px;

display: flex;

flex-direction: column;

align-items: center;

gap: 12px;

font-size: 13px;

}

.social-icons {

display: flex;

gap: 18px;

}

.social-icons a {

color: white;

font-size: 18px;

transition: 0.3s;

}

.social-icons a:hover {

transform: scale(1.25);

color: #FFD700;

}

.footer-links {

display: flex;

gap: 10px;

align-items: center;

}

.footer-links a {

color: rgba(255,255,255,0.8);

text-decoration: none;

}

.footer-links a:hover {

color: #FFD700;

}

.copyright {

color: rgba(255,255,255,0.7);

font-size: 12px;

}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<img src="logo.png" class="logo">

<div class="title">Truvyo</div>

<div class="tagline">
Trust Built by People
</div>

<div class="description">
A human-verified platform where real people share trusted experiences.
</div>

<div class="coming">
🚀 Coming Soon
</div>

<div id="waitlistCount">
🔥 Loading waitlist count...
</div>

<div class="email-form">

<form id="emailForm">

<input
type="email"
name="email"
placeholder="Enter your email"
required>

<br>

<button
type="submit"
id="submitBtn">

Notify Me

</button>

<div id="formMessage"
class="message"></div>

<div id="referralBox"
class="referral-box"></div>

<button
id="whatsappShare"
class="whatsapp-btn">

📲 Share on WhatsApp

</button>

</form>

</div>

<!-- Footer -->

<div class="footer">

<div class="social-icons">

<a href="https://instagram.com/truvyo" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://x.com/truvyo" target="_blank">
<i class="fab fa-x-twitter"></i>
</a>

<a href="https://linkedin.com/company/truvyo" target="_blank">
<i class="fab fa-linkedin"></i>
</a>

<a href="https://wa.me/" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

</div>

<div class="footer-links">

<a href="/privacy.html">
Privacy Policy
</a>

<span>|</span>

<a href="/terms.html">
Terms & Conditions
</a>

</div>

<div class="copyright">

© 2026 Truvyo

</div>

</div>

</div>

<script>

/* PARTICLES */

particlesJS("particles-js", {

particles: {

number: { value: 55 },

color: { value: "#ffffff" },

shape: { type: "circle" },

opacity: { value: 0.4 },

size: { value: 3 },

move: { enable: true, speed: 1 }

}

});

/* LOAD WAITLIST */

async function loadCount() {

try {

var response =
await fetch(
"https://script.google.com/macros/s/AKfycbyWFM8UCgmgLmVGkh7qUn-RQSyfpwPMWEtQ32tajJ8oVOsujIJ7rvJSpobbdXym9ssb/exec"
);

var text =
await response.text();

if (!isNaN(text)) {

document.getElementById(
"waitlistCount"
).innerHTML =

"🔥 " + text +
" people already joined!";

}

}

catch(e) {}

}

loadCount();

/* REFERRAL */

function getReferral() {

var params =
new URLSearchParams(
window.location.search
);

return params.get("ref");

}

/* FORM SUBMIT */

document
.getElementById("emailForm")
.addEventListener("submit",
async function(event) {

event.preventDefault();

var email =
this.querySelector(
'input[name="email"]').value;

var message =
document.getElementById("formMessage");

var referralBox =
document.getElementById("referralBox");

var whatsappBtn =
document.getElementById("whatsappShare");

var button =
document.getElementById("submitBtn");

button.innerHTML =
"⏳ Please wait...";

button.disabled = true;

try {

var response =
await fetch(
"https://script.google.com/macros/s/AKfycbyWFM8UCgmgLmVGkh7qUn-RQSyfpwPMWEtQ32tajJ8oVOsujIJ7rvJSpobbdXym9ssb/exec",
{

method: "POST",

body: new URLSearchParams({

email: email,
ref: getReferral() || ""

})

});

var result =
await response.text();

/* DUPLICATE */

if (result === "Duplicate") {

message.innerHTML =
"⚠️ Email already registered!";

button.innerHTML =
"Notify Me";

button.disabled = false;

return;

}

/* ERROR */

if (isNaN(result)) {

message.innerHTML =
"❌ Server error — try again";

button.innerHTML =
"Notify Me";

button.disabled = false;

return;

}

/* SUCCESS */

message.innerHTML =
"🎉 You're #" +
result +
" on the waitlist!";

/* REF LINK */

var referralLink =
window.location.origin +
"/?ref=" +
result;

referralBox.style.display =
"block";

referralBox.innerHTML =

"🔗 Share your link:<br>" +

"<input id='refLinkBox' " +

"style='width:100%;padding:6px;border-radius:6px;border:none;margin-top:5px;' " +

"value='" + referralLink + "' readonly>" +

"<button id='copyBtn' " +

"style='margin-top:6px;padding:6px 10px;border:none;border-radius:6px;'>📋 Copy Link</button>";

/* COPY */

document
.getElementById("copyBtn")
.onclick = function() {

navigator.clipboard.writeText(
referralLink
);

this.innerHTML =
"✅ Copied!";

};

/* WHATSAPP */

whatsappBtn.style.display =
"inline-block";

whatsappBtn.onclick = function() {

var msg =

"🚀 I just joined Truvyo!\n\nJoin early 👇\n" +

referralLink;

var url =

"https://wa.me/?text=" +

encodeURIComponent(msg);

window.open(url, "_blank");

};

loadCount();

}

catch(error) {

message.innerHTML =
"❌ Something went wrong";

button.innerHTML =
"Notify Me";

button.disabled = false;

}

});

</script>

</body>

</html>
