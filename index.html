<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truvyo — Trust Built by People</title>

<meta name="description"
content="A human-verified platform where real people share trusted experiences. Join early access today.">

<link rel="icon" href="/favicon.png">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>

/* BACKGROUND */

body {
margin: 0;
font-family: Arial, sans-serif;
background: linear-gradient(
270deg,
#7B3FF2,
#4A148C,
#1A237E
);
background-size: 600% 600%;
animation: gradientMove 15s ease infinite;
color: white;
overflow-x: hidden;
}

@keyframes gradientMove {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

#particles-js {
position: fixed;
width: 100%;
height: 100%;
z-index: 0;
}

/* CONTAINER */

.container {
position: relative;
z-index: 1;
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 20px;
}

/* LOGO */

.logo {
width: 120px;
margin-bottom: 20px;
animation: floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo {
0% { transform: translateY(0px); }
50% { transform: translateY(-12px); }
100% { transform: translateY(0px); }
}

/* TEXT */

.title {
font-size: 46px;
font-weight: bold;
}

.tagline {
font-size: 20px;
margin-top: 10px;
}

.description {
margin-top: 18px;
max-width: 440px;
}

.coming {
margin-top: 24px;
font-size: 22px;
font-weight: bold;
}

.limited {
margin-top: 6px;
font-size: 14px;
color: #FFD700;
font-weight: bold;
}

#waitlistCount {
margin-top: 8px;
font-size: 15px;
color: #FFD700;
}

/* PROGRESS BAR */

.progress-bar {
width: 240px;
height: 8px;
background: rgba(255,255,255,0.2);
border-radius: 10px;
margin-top: 8px;
overflow: hidden;
}

.progress-fill {
height: 100%;
width: 0%;
background: linear-gradient(
90deg,
#FFD700,
#FFA500
);
transition: 0.4s;
}

/* TRUST BADGES */

.trust-badges {
margin-top: 18px;
font-size: 14px;
color: #FFD700;
display: flex;
gap: 12px;
flex-wrap: wrap;
justify-content: center;
}

/* FORM CARD */

.email-form {

margin-top: 26px;

background:
rgba(255,255,255,0.12);

backdrop-filter: blur(18px);

border-radius: 18px;

padding: 26px;

box-shadow:
0 10px 40px rgba(0,0,0,0.35);

border:
1px solid rgba(255,255,255,0.18);

transition: 0.3s;
}

.email-form:hover {
transform: translateY(-4px);
}

/* INPUT */

.email-form input {

padding: 14px;

width: 260px;

border-radius: 10px;

border: 1px solid rgba(255,255,255,0.35);

background:
rgba(255,255,255,0.18);

color: white;

font-size: 14px;

outline: none;

}

/* BUTTON */

.email-form button {

margin-top: 14px;

padding: 13px 22px;

border-radius: 10px;

border: none;

background:
linear-gradient(
45deg,
#FFD700,
#ffffff
);

color: #1A237E;

font-weight: bold;

font-size: 15px;

cursor: pointer;

transition: 0.3s;

}

.email-form button:hover {

transform: scale(1.06);

box-shadow:
0 0 18px rgba(255,215,0,0.7);

}

.message {
margin-top: 10px;
font-size: 14px;
}

.referral-box {
margin-top: 10px;
font-size: 13px;
color: #FFD700;
display: none;
width: 100%;
}

.whatsapp-btn {

margin-top: 10px;

padding: 10px 16px;

border-radius: 8px;

border: none;

background: #25D366;

color: white;

font-weight: bold;

cursor: pointer;

display: none;

}

/* FOOTER */

.footer {

margin-top: 40px;

font-size: 13px;

color: rgba(255,255,255,0.7);

text-align: center;

}

.footer a {

color: #FFD700;

text-decoration: none;

margin: 0 8px;

}

.social-icons {

margin-top: 8px;

}

.social-icons i {

margin: 0 6px;

font-size: 18px;

cursor: pointer;

transition: 0.3s;

}

.social-icons i:hover {

transform: scale(1.2);

color: #FFD700;

}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<img src="logo.png" class="logo">

<div class="title">Truvyo</div>

<div class="tagline">
Trust Built by People
</div>

<div class="description">
A human-verified platform where real people share trusted experiences.
</div>

<div class="coming">
🚀 Coming Soon
</div>

<div class="limited">
⚡ Only 100 Early Users
</div>

<div id="waitlistCount">
🔥 Loading waitlist count...
</div>

<div class="progress-bar">
<div
id="progressFill"
class="progress-fill">
</div>
</div>

<div class="trust-badges">
✔ Human Verified  
✔ No Fake Reviews  
✔ Privacy First  
</div>

<div class="email-form">

<form id="emailForm">

<input
type="text"
name="website"
id="website"
style="display:none">

<input
type="email"
name="email"
placeholder="Enter your email"
required>

<br>

<button
type="submit"
id="submitBtn">

Notify Me

</button>

<div id="formMessage"
class="message"></div>

<div id="referralBox"
class="referral-box"></div>

<button
id="whatsappShare"
class="whatsapp-btn">

📲 Share on WhatsApp

</button>

</form>

</div>

<div class="footer">

<div>

© <span id="year"></span> Truvyo  

<a href="privacy.html">
Privacy
</a>

<a href="terms.html">
Terms
</a>

</div>

<div class="social-icons">

<i class="fab fa-instagram"></i>

<i class="fab fa-twitter"></i>

<i class="fab fa-linkedin"></i>

</div>

</div>

</div>

<script>

/* YEAR */

document.getElementById("year")
.innerHTML = new Date().getFullYear();

/* SETTINGS */

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbx1aSeB2hyDGRQkhHelL5h5uQh0c1JbPH_NSAEDOWyY76PLKc22O4YIqShOI2yRsLVi/exec";

const MAX_USERS = 100;

/* PARTICLES */

particlesJS("particles-js", {
particles: {
number: { value: 55 },
color: { value: "#ffffff" },
shape: { type: "circle" },
opacity: { value: 0.4 },
size: { value: 3 },
move: { enable: true, speed: 1 }
}
});

/* LOAD COUNT */

async function loadCount() {

try {

var response =
await fetch(SCRIPT_URL);

var text =
await response.text();

if (!isNaN(text)) {

document.getElementById(
"waitlistCount"
).innerHTML =

"🔥 " + text +
" of " + MAX_USERS +
" early spots filled!";

var percent =
(text / MAX_USERS) * 100;

document.getElementById(
"progressFill"
).style.width =
percent + "%";

}

}

catch(e) {

document.getElementById(
"waitlistCount"
).innerHTML =
"🔥 Join the waitlist today!";

}

}

loadCount();

</script>

</body>

</html>
