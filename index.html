<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Truvyo</title>
<meta name="description" content="Search before you trust.">

<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
:root {
--mouse-x: 50%;
--mouse-y: 28%;
}

* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
color: white;
overflow: hidden;
background:
radial-gradient(circle at 30% 40%, rgba(123,63,242,0.25), transparent 35%),
radial-gradient(circle at 70% 30%, rgba(0,220,255,0.15), transparent 30%),
linear-gradient(180deg,#15164a,#23165f,#121a45);
animation: bgFlow 18s ease infinite;
}

@keyframes bgFlow {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

body::before {
content: "";
position: fixed;
inset: 0;
z-index: 0;
pointer-events: none;
background:
radial-gradient(circle at center, rgba(143,239,255,0.09), transparent 58%);
}

body::after {
content: "";
position: fixed;
inset: 0;
z-index: 1;
pointer-events: none;
box-shadow:
inset 0 0 80px rgba(0,0,0,0.35),
inset 0 0 160px rgba(0,0,0,0.25);
}

#particles-js {
position: fixed;
inset: 0;
z-index: 1;
}

.edge-glow {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 2;
overflow: hidden;
}

.edge-glow::before {
content: "";
position: absolute;
inset: -6px;
padding: 8px;
background: linear-gradient(120deg,#8FEFFF,#8B5CFF,#FF4FD8,#8FEFFF);
background-size: 400% 400%;
filter: blur(22px);
opacity: 0.75;
box-shadow:
0 0 40px rgba(143,239,255,0.42),
0 0 80px rgba(139,92,255,0.36),
0 0 120px rgba(255,79,216,0.26);
animation:
flowingEdge 5s linear infinite,
breatheGlow 3s ease-in-out infinite;
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite: xor;
mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
mask-composite: exclude;
}

.edge-glow::after {
content: "";
position: absolute;
width: 320px;
height: 320px;
left: var(--mouse-x);
top: var(--mouse-y);
transform: translate(-50%, -50%);
background: radial-gradient(circle, rgba(143,239,255,0.35), transparent 65%);
filter: blur(24px);
opacity: 0.9;
transition: left 0.08s ease, top 0.08s ease;
}

.edge-glow-top {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 2px;
z-index: 4;
pointer-events: none;
background: linear-gradient(90deg,transparent,#8FEFFF,#8B5CFF,#FF4FD8,transparent);
background-size: 220% 100%;
animation: topFlow 4s linear infinite;
box-shadow:
0 0 14px rgba(143,239,255,0.7),
0 0 28px rgba(139,92,255,0.45);
}

.tap-pulse {
position: fixed;
width: 16px;
height: 16px;
border-radius: 50%;
pointer-events: none;
z-index: 5;
transform: translate(-50%, -50%);
background: rgba(143,239,255,0.7);
box-shadow:
0 0 30px rgba(143,239,255,0.9),
0 0 70px rgba(139,92,255,0.7),
0 0 110px rgba(255,79,216,0.45);
animation: tapPulse 0.75s ease-out forwards;
}

@keyframes tapPulse {
0% {
opacity: 0.95;
width: 12px;
height: 12px;
}
100% {
opacity: 0;
width: 220px;
height: 220px;
}
}

@keyframes flowingEdge {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

@keyframes breatheGlow {
0%,100% { opacity: 0.62; }
50% { opacity: 0.95; }
}

@keyframes topFlow {
0% { background-position: 0% 0; }
100% { background-position: 220% 0; }
}

.container {
position: relative;
z-index: 3;
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding:
calc(20px + env(safe-area-inset-top))
20px
calc(20px + env(safe-area-inset-bottom));
}

.logo {
width: 90px;
margin-bottom: 6px;
animation: floatLogo 5s ease-in-out infinite;
}

@keyframes floatLogo {
0% { transform: translateY(0); }
50% { transform: translateY(-8px); }
100% { transform: translateY(0); }
}

.title {
font-size: clamp(36px,5vw,52px);
font-weight: 800;
background: linear-gradient(90deg,#fff,#bfa8ff,#8FEFFF,#fff);
background-size: 250%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
animation: shine 6s linear infinite;
}

@keyframes shine {
0% { background-position: 0% }
100% { background-position: 250% }
}

.tagline {
font-size: 18px;
margin-top: 4px;
color: rgba(255,255,255,0.85);
}

.description {
margin-top: 12px;
max-width: 420px;
font-size: 15px;
color: rgba(255,255,255,0.7);
}

.coming {
margin-top: 18px;
font-size: 20px;
}

#waitlistCount {
margin-top: 6px;
font-size: 14px;
color: #8FEFFF;
}

.email-form {
margin-top: 20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
border-radius: 18px;
padding: 24px;
border: 1px solid rgba(255,255,255,0.15);
box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

.email-form input {
padding: 12px;
width: 240px;
border-radius: 10px;
border: none;
background: rgba(255,255,255,0.15);
color: white;
outline: none;
}

.email-form input::placeholder {
color: rgba(255,255,255,0.6);
}

.email-form button {
margin-top: 12px;
padding: 12px 20px;
border-radius: 10px;
border: none;
background: linear-gradient(45deg,#fff,#8FEFFF);
color: #111;
font-weight: bold;
cursor: pointer;
transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.email-form button:hover {
transform: translateY(-2px);
box-shadow: 0 0 28px rgba(143,239,255,0.45);
}

.message {
margin-top: 10px;
font-size: 14px;
}

.secret-check {
margin-top: 10px;
font-size: 14px;
color: rgba(255,255,255,0.75);
animation: pulseCheck 1.2s ease-in-out infinite;
}

@keyframes pulseCheck {
0% { opacity: 0.4; transform: translateY(2px); }
50% { opacity: 1; transform: translateY(0); }
100% { opacity: 0.4; transform: translateY(2px); }
}

.secret-success {
animation: revealSecret 0.7s ease;
}

@keyframes revealSecret {
0% {
opacity: 0;
transform: scale(0.96) translateY(8px);
filter: blur(4px);
}
100% {
opacity: 1;
transform: scale(1) translateY(0);
filter: blur(0);
}
}

.footer {
margin-top: 20px;
font-size: 12px;
color: rgba(255,255,255,0.6);
}

.social-icons {
margin-top: 8px;
display: flex;
gap: 14px;
justify-content: center;
}

.social-icons a {
color: rgba(255,255,255,0.6);
transition: 0.3s;
}

.social-icons a:hover {
color: #8FEFFF;
transform: translateY(-3px);
}

@media (max-width: 768px) {
.logo {
width: 76px;
}

.title {
font-size: 40px;
}

.tagline {
font-size: 16px;
}

.description {
font-size: 14px;
max-width: 310px;
}

.email-form {
padding: 20px;
width: calc(100% - 44px);
max-width: 320px;
}

.email-form input {
width: 100%;
}

.edge-glow-top {
height: 1.5px;
opacity: 0.85;
}

.edge-glow::before {
opacity: 0.58;
filter: blur(16px);
padding: 5px;
}

.edge-glow::after {
width: 180px;
height: 180px;
opacity: 0.42;
filter: blur(16px);
}

.tap-pulse {
animation-duration: 0.6s;
}
}

@media (prefers-reduced-motion: reduce) {
* {
animation-duration: 0.01ms !important;
animation-iteration-count: 1 !important;
transition-duration: 0.01ms !important;
}
}
</style>
</head>

<body>

<div id="particles-js"></div>
<div class="edge-glow"></div>
<div class="edge-glow-top"></div>

<div class="container">

<img src="logo.png" class="logo">

<div class="title">Truvyo</div>

<div class="tagline">Search before you trust.</div>

<div class="description">
Some people already search before they trust.
</div>

<div class="coming">🚀 Coming Soon</div>

<div id="waitlistCount">
Only 100 early access spots<br>
Loading...
</div>

<div class="email-form">
<form id="emailForm">

<input type="text" name="website" style="display:none">
<input type="email" name="email" placeholder="Get early access" required>
<br>

<button type="submit" id="submitBtn">Join Waitlist</button>

<div id="formMessage" class="message"></div>

</form>
</div>

<div class="footer">
© 2026 Truvyo

<div class="social-icons">
<a href="https://www.instagram.com/truvyoapp/"><i class="fab fa-instagram"></i></a>
<a href="https://x.com/truvyo"><i class="fab fa-x-twitter"></i></a>
<a href="#"><i class="fab fa-linkedin"></i></a>
</div>

</div>

</div>

<script>
particlesJS("particles-js", {
particles: {
number: { value: window.innerWidth < 768 ? 24 : 40 },
color: { value: "#ffffff" },
opacity: { value: 0.3 },
size: { value: 2 },
move: { enable: true, speed: 0.3 }
}
});

const isTouchDevice = window.matchMedia("(pointer: coarse)").matches;

if (!isTouchDevice) {
document.addEventListener("mousemove", function(e){
document.documentElement.style.setProperty("--mouse-x", e.clientX + "px");
document.documentElement.style.setProperty("--mouse-y", e.clientY + "px");
});
} else {
document.documentElement.style.setProperty("--mouse-x", "50%");
document.documentElement.style.setProperty("--mouse-y", "28%");
}

function createTapPulse(x, y) {
const pulse = document.createElement("span");
pulse.className = "tap-pulse";
pulse.style.left = x + "px";
pulse.style.top = y + "px";
document.body.appendChild(pulse);

setTimeout(function(){
pulse.remove();
}, 800);
}

document.addEventListener("click", function(e){
createTapPulse(e.clientX, e.clientY);
});

document.addEventListener("touchstart", function(e){
if (e.touches && e.touches.length > 0) {
createTapPulse(e.touches[0].clientX, e.touches[0].clientY);
}
}, { passive: true });

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdzVEZEDKAm7EDCCE0iXCoR5ZEWtlFTNlfgtzMKLZaRrkPA3KSjQZp8Uom6swsr3LM/exec";

async function loadCount(){
try{
let res = await fetch(SCRIPT_URL);
let count = await res.text();

if(!isNaN(count)){
document.getElementById("waitlistCount").innerHTML =
"Only 100 early access spots<br>" +
count + " already taken";
}
}catch{}
}

loadCount();

document.getElementById("emailForm").addEventListener("submit", async function(e){

e.preventDefault();

let email = this.email.value;
let msg = document.getElementById("formMessage");
let btn = document.getElementById("submitBtn");

btn.innerHTML="Verifying...";
btn.disabled=true;

try{

let res = await fetch(SCRIPT_URL,{
method:"POST",
body:new URLSearchParams({email})
});

let result = await res.text();

if(result==="Duplicate"){
msg.innerHTML="⚠️ Already inside";
}else if(!isNaN(result)){

msg.className = "secret-check";
msg.innerHTML = "🔎 Checking your invite...";

setTimeout(function(){

msg.className = "message secret-success";
msg.innerHTML =
"🎉 Invite unlocked.<br>" +
"You're #" + result + " inside the first 100.";

},1400);

}else{
msg.innerHTML="❌ Try again";
}

}catch{
msg.innerHTML="❌ Error";
}

btn.innerHTML="Join Waitlist";
btn.disabled=false;

});
</script>

</body>
</html>
