<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truvyo — Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;

  background: linear-gradient(
    135deg,
    #4f46e5,
    #0ea5e9,
    #9333ea
  );

  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  color: white;
  text-align: center;
}

.container {
  max-width: 520px;
  padding: 40px;

  background: rgba(0,0,0,0.25);

  border-radius: 14px;

  backdrop-filter: blur(10px);
}

.logo {
  font-size: 44px;
  font-weight: 700;
  letter-spacing: 1px;
}

.tagline {
  margin-top: 12px;
  font-size: 20px;
  font-weight: 500;
}

.description {
  margin-top: 18px;
  font-size: 15px;
  color: #e5e7eb;
}

.email-box {
  margin-top: 26px;
}

input[type=email] {

  padding: 14px;
  width: 65%;

  border-radius: 8px;
  border: none;

  outline: none;
}

button {

  padding: 14px 18px;

  border-radius: 8px;
  border: none;

  background: white;
  color: #111827;

  font-weight: 600;

  cursor: pointer;
}

button:hover {
  background: #e5e7eb;
}

.footer {

  margin-top: 28px;

  font-size: 13px;
  color: #d1d5db;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Truvyo
</div>

<div class="tagline">
Trust. Verify. Connect.
</div>

<div class="description">
We're building something powerful.
Join the waitlist and be the first to know when we launch.
</div>

<div class="email-box">

<form action="https://formspree.io/f/YOUR-ID" method="POST">

<input
type="email"
name="email"
placeholder="Enter your email"
required
>

<button type="submit">
Notify Me
</button>

</form>

</div>

<div class="footer">
© 2026 Truvyo — All rights reserved
</div>

</div>

</body>

</html>
