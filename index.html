<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truvyo — Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  max-width: 500px;
  padding: 40px;
}

.logo {
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 1px;
}

.tagline {
  font-size: 20px;
  margin-top: 12px;
  color: #cbd5f5;
}

.description {
  margin-top: 18px;
  font-size: 15px;
  color: #94a3b8;
}

.email-box {
  margin-top: 28px;
}

input[type=email] {
  padding: 14px;
  width: 70%;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  padding: 14px 20px;
  border-radius: 10px;
  border: none;
  background: #6366f1;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  background: #4f46e5;
}

.footer {
  margin-top: 30px;
  font-size: 13px;
  color: #64748b;
}

.social {
  margin-top: 20px;
}

.social a {
  margin: 0 10px;
  color: #cbd5f5;
  text-decoration: none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Truvyo
</div>

<div class="tagline">
Trust. Verify. Connect.
</div>

<div class="description">
We're building something powerful.  
Join the waitlist and be the first to experience Truvyo.
</div>

<div class="email-box">

<form action="https://formspree.io/f/YOUR-ID" method="POST">

<input
type="email"
name="email"
placeholder="Enter your email"
required
>

<button type="submit">
Notify Me
</button>

</form>

</div>

<div class="social">

<a href="#">Instagram</a>
<a href="#">Twitter</a>
<a href="#">LinkedIn</a>

</div>

<div class="footer">

© 2026 Truvyo — All rights reserved

</div>

</div>

</body>
</html>
