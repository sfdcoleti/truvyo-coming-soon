<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truvyo</title>
<meta name="description" content="Search before you trust.">

<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

/* ===== BACKGROUND ===== */

body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
color: white;
overflow: hidden;

background:
radial-gradient(circle at 30% 40%, rgba(123,63,242,0.25), transparent 35%),
radial-gradient(circle at 70% 30%, rgba(0,220,255,0.15), transparent 30%),
linear-gradient(180deg,#15164a,#23165f,#121a45);

animation: bgFlow 18s ease infinite;
}

@keyframes bgFlow {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

/* ===== NEXT LEVEL EDGE GLOW ===== */

.edge-glow {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 2;
overflow: hidden;
}

.edge-glow::before {
content: "";
position: absolute;
inset: -4px;
background:
linear-gradient(90deg, #8FEFFF, #8B5CFF, #FF4FD8, #8FEFFF);
background-size: 300% 300%;
filter: blur(18px);
opacity: 0.45;
animation: flowingEdge 6s linear infinite;

mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);

padding: 6px;
-webkit-mask-composite: xor;
mask-composite: exclude;
}

.edge-glow::after {
content: "";
position: absolute;
width: 280px;
height: 280px;
left: var(--mouse-x, 50%);
top: var(--mouse-y, 50%);
transform: translate(-50%, -50%);
background: radial-gradient(circle, rgba(143,239,255,0.28), transparent 65%);
filter: blur(20px);
opacity: 0.8;
}

@keyframes flowingEdge {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

/* ===== PARTICLES ===== */

#particles-js {
position: fixed;
width: 100%;
height: 100%;
z-index: 1;
}

/* ===== LAYOUT ===== */

.container {
position: relative;
z-index: 3;
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 20px;
}

/* ===== LOGO ===== */

.logo {
width: 90px;
margin-bottom: 6px;
animation: floatLogo 5s ease-in-out infinite;
}

@keyframes floatLogo {
0% { transform: translateY(0); }
50% { transform: translateY(-8px); }
100% { transform: translateY(0); }
}

/* ===== TITLE ===== */

.title {
font-size: clamp(36px,5vw,52px);
font-weight: 800;
background: linear-gradient(90deg,#fff,#bfa8ff,#8FEFFF,#fff);
background-size: 250%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
animation: shine 6s linear infinite;
}

@keyframes shine {
0% { background-position: 0% }
100% { background-position: 250% }
}

/* ===== TAGLINE ===== */

.tagline {
font-size: 18px;
margin-top: 4px;
color: rgba(255,255,255,0.85);
}

/* ===== DESCRIPTION ===== */

.description {
margin-top: 12px;
max-width: 420px;
font-size: 15px;
color: rgba(255,255,255,0.7);
}

/* ===== COMING ===== */

.coming {
margin-top: 18px;
font-size: 20px;
}

/* ===== WAITLIST ===== */

#waitlistCount {
margin-top: 6px;
font-size: 14px;
color: #8FEFFF;
}

/* ===== FORM ===== */

.email-form {
margin-top: 20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(16px);
border-radius: 18px;
padding: 24px;
border: 1px solid rgba(255,255,255,0.15);
}

.email-form input {
padding: 12px;
width: 240px;
border-radius: 10px;
border: none;
background: rgba(255,255,255,0.15);
color: white;
}

.email-form input::placeholder {
color: rgba(255,255,255,0.6);
}

.email-form button {
margin-top: 12px;
padding: 12px 20px;
border-radius: 10px;
border: none;
background: linear-gradient(45deg,#fff,#8FEFFF);
color: #111;
font-weight: bold;
cursor: pointer;
}

.message {
margin-top: 10px;
font-size: 14px;
}

/* ===== SECRET ANIMATION ===== */

.secret-check {
margin-top: 10px;
font-size: 14px;
color: rgba(255,255,255,0.75);
animation: pulseCheck 1.2s ease-in-out infinite;
}

@keyframes pulseCheck {
0% { opacity: 0.4; transform: translateY(2px); }
50% { opacity: 1; transform: translateY(0); }
100% { opacity: 0.4; transform: translateY(2px); }
}

.secret-success {
animation: revealSecret 0.7s ease;
}

@keyframes revealSecret {
0% {
opacity: 0;
transform: scale(0.96) translateY(8px);
filter: blur(4px);
}
100% {
opacity: 1;
transform: scale(1) translateY(0);
filter: blur(0);
}
}

/* ===== FOOTER ===== */

.footer {
margin-top: 20px;
font-size: 12px;
color: rgba(255,255,255,0.6);
}

.social-icons {
margin-top: 8px;
display: flex;
gap: 14px;
justify-content: center;
}

.social-icons a {
color: rgba(255,255,255,0.6);
transition: 0.3s;
}

.social-icons a:hover {
color: #8FEFFF;
transform: translateY(-3px);
}

</style>
</head>

<body>

<div id="particles-js"></div>
<div class="edge-glow"></div>

<div class="container">

<img src="logo.png" class="logo">

<div class="title">Truvyo</div>

<div class="tagline">Search before you trust.</div>

<div class="description">
Some people already search before they trust.
</div>

<div class="coming">🚀 Coming Soon</div>

<div id="waitlistCount">
Only 100 early access spots<br>
Loading...
</div>

<div class="email-form">

<form id="emailForm">

<input type="text" name="website" style="display:none">
<input type="email" name="email" placeholder="Get early access" required>
<br>

<button type="submit" id="submitBtn">Join Waitlist</button>

<div id="formMessage" class="message"></div>

</form>

</div>

<div class="footer">
© 2026 Truvyo

<div class="social-icons">
<a href="https://www.instagram.com/truvyoapp/"><i class="fab fa-instagram"></i></a>
<a href="https://x.com/truvyo"><i class="fab fa-x-twitter"></i></a>
<a href="#"><i class="fab fa-linkedin"></i></a>
</div>

</div>

</div>

<script>

particlesJS("particles-js", {
particles: {
number: { value: 40 },
color: { value: "#ffffff" },
opacity: { value: 0.3 },
size: { value: 2 },
move: { enable: true, speed: 0.3 }
}
});

/* 🔥 Mouse Glow */
document.addEventListener("mousemove", function(e){
document.documentElement.style.setProperty("--mouse-x", e.clientX + "px");
document.documentElement.style.setProperty("--mouse-y", e.clientY + "px");
});

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdzVEZEDKAm7EDCCE0iXCoR5ZEWtlFTNlfgtzMKLZaRrkPA3KSjQZp8Uom6swsr3LM/exec";

async function loadCount(){
try{
let res = await fetch(SCRIPT_URL);
let count = await res.text();

if(!isNaN(count)){
document.getElementById("waitlistCount").innerHTML =
"Only 100 early access spots<br>" +
count + " already taken";
}
}catch{}
}

loadCount();

document.getElementById("emailForm").addEventListener("submit", async function(e){

e.preventDefault();

let email = this.email.value;
let msg = document.getElementById("formMessage");
let btn = document.getElementById("submitBtn");

btn.innerHTML="Verifying...";
btn.disabled=true;

try{

let res = await fetch(SCRIPT_URL,{
method:"POST",
body:new URLSearchParams({email})
});

let result = await res.text();

if(result==="Duplicate"){
msg.innerHTML="⚠️ Already inside";
}else if(!isNaN(result)){

msg.className = "secret-check";
msg.innerHTML = "🔎 Checking your invite...";

setTimeout(function(){

msg.className = "message secret-success";
msg.innerHTML =
"🎉 Invite unlocked.<br>" +
"You're #" + result + " inside the first 100.";

},1400);

}else{
msg.innerHTML="❌ Try again";
}

}catch{
msg.innerHTML="❌ Error";
}

btn.innerHTML="Join Waitlist";
btn.disabled=false;

});

</script>

</body>
</html>
