<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truvyo — Trust Built by People</title>

<meta name="description"
content="A human-verified platform where real people share trusted experiences. Join early access today.">

<link rel="icon" href="/favicon.png">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>

/* YOUR CSS UNCHANGED */

body {
margin: 0;
font-family: Arial, sans-serif;
background: linear-gradient(
270deg,
#7B3FF2,
#4A148C,
#1A237E
);
background-size: 600% 600%;
animation: gradientMove 15s ease infinite;
color: white;
overflow-x: hidden;
}

@keyframes gradientMove {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

#particles-js {
position: fixed;
width: 100%;
height: 100%;
z-index: 0;
}

.container {
position: relative;
z-index: 1;
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 20px;
}

.logo {
width: 120px;
margin-bottom: 20px;
animation: floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo {
0% { transform: translateY(0px); }
50% { transform: translateY(-12px); }
100% { transform: translateY(0px); }
}

.title {
font-size: 46px;
font-weight: bold;
}

.tagline {
font-size: 20px;
margin-top: 10px;
}

.description {
margin-top: 18px;
max-width: 440px;
}

.coming {
margin-top: 24px;
font-size: 22px;
font-weight: bold;
}

#waitlistCount {
margin-top: 8px;
font-size: 15px;
color: #FFD700;
}

.email-form {
margin-top: 26px;
background: rgba(255,255,255,0.1);
backdrop-filter: blur(12px);
border-radius: 14px;
padding: 24px;
box-shadow:
0 8px 32px rgba(0,0,0,0.25);
}

.email-form input {
padding: 12px;
width: 240px;
border-radius: 8px;
border: 1px solid rgba(255,255,255,0.3);
background: rgba(255,255,255,0.15);
color: white;
}

.email-form button {
margin-top: 14px;
padding: 12px 18px;
border-radius: 8px;
border: none;
background: linear-gradient(
45deg,
#ffffff,
#dcdcdc
);
color: #1A237E;
font-weight: bold;
cursor: pointer;
transition: 0.3s;
}

.email-form button:hover {
transform: scale(1.05);
box-shadow:
0 0 15px rgba(255,255,255,0.6);
}

.message {
margin-top: 10px;
font-size: 14px;
}

.referral-box {
margin-top: 10px;
font-size: 13px;
color: #FFD700;
display: none;
width: 100%;
}

.whatsapp-btn {
margin-top: 10px;
padding: 10px 16px;
border-radius: 8px;
border: none;
background: #25D366;
color: white;
font-weight: bold;
cursor: pointer;
display: none;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<img src="logo.png" class="logo">

<div class="title">Truvyo</div>

<div class="tagline">
Trust Built by People
</div>

<div class="description">
A human-verified platform where real people share trusted experiences.
</div>

<div class="coming">
🚀 Coming Soon
</div>

<div id="waitlistCount">
🔥 Loading waitlist count...
</div>

<div class="email-form">

<form id="emailForm">

<!-- Honeypot -->

<input
type="text"
name="website"
id="website"
style="display:none">

<input
type="email"
name="email"
placeholder="Enter your email"
required>

<br>

<button
type="submit"
id="submitBtn">

Notify Me

</button>

<div id="formMessage"
class="message"></div>

<div id="referralBox"
class="referral-box"></div>

<button
id="whatsappShare"
class="whatsapp-btn">

📲 Share on WhatsApp

</button>

</form>

</div>

</div>

<script>

/* SETTINGS */

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbx1aSeB2hyDGRQkhHelL5h5uQh0c1JbPH_NSAEDOWyY76PLKc22O4YIqShOI2yRsLVi/exec";

const MAX_USERS = 100;

/* PARTICLES */

particlesJS("particles-js", {
particles: {
number: { value: 55 },
color: { value: "#ffffff" },
shape: { type: "circle" },
opacity: { value: 0.4 },
size: { value: 3 },
move: { enable: true, speed: 1 }
}
});

/* LOAD COUNT */

async function loadCount() {

try {

var response =
await fetch(SCRIPT_URL);

var text =
await response.text();

if (!isNaN(text)) {

if (Number(text) >= MAX_USERS) {

document.getElementById(
"waitlistCount"
).innerHTML =
"🚫 Early access full — stay tuned!";

document.getElementById(
"submitBtn"
).disabled = true;

return;

}

document.getElementById(
"waitlistCount"
).innerHTML =

"🔥 " + text +
" of " + MAX_USERS +
" early spots filled!";

}

}

catch(e) {

document.getElementById(
"waitlistCount"
).innerHTML =
"🔥 Join the waitlist today!";

}

}

loadCount();

/* REFERRAL */

function getReferral() {

var params =
new URLSearchParams(
window.location.search
);

var ref =
params.get("ref");

if (!ref || isNaN(ref)) {

return "";

}

return ref;

}

/* FORM SUBMIT */

let lastSubmitTime = 0;

document
.getElementById("emailForm")
.addEventListener("submit",
async function(event) {

event.preventDefault();

var message =
document.getElementById("formMessage");

var button =
document.getElementById("submitBtn");

var referralBox =
document.getElementById("referralBox");

var whatsappBtn =
document.getElementById("whatsappShare");

/* RATE LIMIT */

if (Date.now() - lastSubmitTime < 5000) {

message.innerHTML =
"⏳ Please wait a few seconds";

return;

}

lastSubmitTime = Date.now();

/* HONEYPOT */

var honeypot =
document.getElementById("website").value;

if (honeypot !== "") {

message.innerHTML =
"❌ Spam detected";

return;

}

/* EMAIL */

var email =
this.querySelector(
'input[name="email"]').value;

/* EMAIL VALIDATION */

var emailPattern =
/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if (!emailPattern.test(email)) {

message.innerHTML =
"⚠️ Enter a valid email";

return;

}

button.innerHTML =
"⏳ Please wait...";

button.disabled = true;

try {

var response =
await fetch(
SCRIPT_URL,
{
method: "POST",
body: new URLSearchParams({
email: email,
ref: getReferral()
})
});

var result =
await response.text();

/* DUPLICATE */

if (result === "Duplicate") {

message.innerHTML =
"⚠️ Email already registered!";

button.innerHTML =
"Notify Me";

button.disabled = false;

return;

}

/* ERROR */

if (isNaN(result)) {

message.innerHTML =
"❌ Server error — try again";

button.innerHTML =
"Notify Me";

button.disabled = false;

return;

}

/* SUCCESS */

message.innerHTML =
"🎉 You're #" +
result +
" on the waitlist!<br>🏅 Early Access Member";

/* REF LINK */

var referralLink =
window.location.origin +
window.location.pathname +
"?ref=" +
result;

referralBox.style.display =
"block";

referralBox.innerHTML =

"🔗 Share your link:<br>" +

"<input id='refLinkBox' " +

"style='width:100%;padding:6px;border-radius:6px;border:none;margin-top:5px;' " +

"value='" + referralLink + "' readonly>" +

"<button id='copyBtn' " +

"style='margin-top:6px;padding:6px 10px;border:none;border-radius:6px;'>📋 Copy Link</button>";

document
.getElementById("copyBtn")
.onclick = function() {

navigator.clipboard.writeText(
referralLink
);

this.innerHTML =
"✅ Copied!";

};

/* WHATSAPP */

whatsappBtn.style.display =
"inline-block";

whatsappBtn.onclick = function() {

var msg =

"🚀 I just joined Truvyo — a platform built on trusted experiences.\n\n" +

"🔥 Only first 100 users get early access.\n\n" +

"Join before spots fill 👇\n" +

referralLink;

var url =
"https://wa.me/?text=" +
encodeURIComponent(msg);

window.open(url, "_blank");

};

loadCount();

button.innerHTML =
"Notify Me";

button.disabled = false;

}

catch(error) {

message.innerHTML =
"❌ Something went wrong";

button.innerHTML =
"Notify Me";

button.disabled = false;

}

});

</script>

</body>
</html>
