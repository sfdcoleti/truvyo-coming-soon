<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Truvyo — Trust Built by People</title>
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Social Icons Library -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {

    margin: 0;
    font-family: Arial, sans-serif;

    height: 100vh;

    background: radial-gradient(
        circle at center,
        #7B3FF2 0%,
        #4A148C 50%,
        #1A237E 100%
    );

    color: white;
}

/* Main container */

.container {

    height: 100vh;

    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;

    text-align: center;

    padding: 20px;
}

/* Logo */

.logo {

    width: 120px;
    margin-bottom: 20px;
}

/* Title */

.title {

    font-size: 46px;
    font-weight: bold;
}

/* Tagline */

.tagline {

    font-size: 20px;
    margin-top: 10px;
}

/* Description */

.description {

    margin-top: 18px;
    max-width: 440px;

    font-size: 16px;
}

/* Coming soon */

.coming {

    margin-top: 24px;
    font-size: 22px;
    font-weight: bold;
}

/* Email Form */

.email-form {

    margin-top: 22px;
}

.email-form input {

    padding: 12px;

    width: 240px;

    border-radius: 6px;
    border: none;

    outline: none;
}

.email-form button {

    padding: 12px 16px;

    border-radius: 6px;

    border: none;

    background: white;

    color: #1A237E;

    font-weight: bold;

    cursor: pointer;
}

.email-form button:hover {

    background: #e0e0e0;
}

/* Social Icons */

.social {

    margin-top: 24px;
}

.social a {

    margin: 0 10px;

    font-size: 22px;

    color: white;

    transition: 0.3s;
}

.social a:hover {

    color: #ffd54f;
}

/* Contact */

.contact {

    margin-top: 18px;

    font-size: 14px;
}

/* Footer */

.footer {

    position: absolute;

    bottom: 20px;

    font-size: 13px;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="title">
Truvyo
</div>

<div class="tagline">
Trust Built by People
</div>

<div class="description">
A human-verified platform where real people share trusted experiences and businesses earn credibility.
</div>

<div class="coming">
🚀 Coming Soon
</div>

<!-- Email Waitlist -->

<div class="email-form">

<form action="https://formspree.io/f/xojywdpj"
method="POST"
onsubmit="redirectAfterSubmit()">

<input
type="email"
name="email"
placeholder="Enter your email"
required>

<button type="submit">
Notify Me
</button>

</form>

<script>

function redirectAfterSubmit() {

setTimeout(function() {

window.location.href = "thankyou.html";

}, 800);

}

</script>
</div>

<!-- Social Media Icons -->

<div class="social">

<a href="https://instagram.com/truvyoapp" target="blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://twitter.com/truvyo" target="blank">
<i class="fab fa-x-twitter"></i>
</a>

<a href="https://linkedin.com/company/truvyo" target="blank">
<i class="fab fa-linkedin"></i>
</a>

</div>

<div class="contact">
Contact: hello@truvyo.app
</div>

</div>

<div class="footer">
<div class="footer">

© 2026 Truvyo

<br><br>

<a href="/privacy.html">Privacy</a> |
<a href="/terms.html">Terms</a>

</div>
</div>

</body>

</html>
