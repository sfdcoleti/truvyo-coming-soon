<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Truvyo — Trust Built by People</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="description"
content="Truvyo — A human-verified platform where real people share trusted experiences. Join early access today.">

<link rel="icon"
type="image/png"
href="/favicon.png">

<!-- Google Analytics -->

<script async src="https://www.googletagmanager.com/gtag/js?id=G-WGC55NWD1Z"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-WGC55NWD1Z');
</script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Particles -->

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>

/* Animated Background */

body {

margin: 0;
font-family: Arial, sans-serif;
height: 100vh;

background: linear-gradient(
270deg,
#7B3FF2,
#4A148C,
#1A237E
);

background-size: 600% 600%;
animation: gradientMove 15s ease infinite;

color: white;
overflow: hidden;

}

@keyframes gradientMove {

0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }

}

/* Particles */

#particles-js {

position: fixed;
width: 100%;
height: 100%;
z-index: 0;

}

/* Content */

.container {

position: relative;
z-index: 1;

height: 100vh;

display: flex;
flex-direction: column;
justify-content: center;
align-items: center;

text-align: center;
padding: 20px;

}

/* Logo Animation */

.logo {

width: 120px;
margin-bottom: 20px;

animation: floatLogo 4s ease-in-out infinite;

}

@keyframes floatLogo {

0% { transform: translateY(0px); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0px); }

}

/* Text */

.title {

font-size: 46px;
font-weight: bold;

}

.tagline {

font-size: 20px;
margin-top: 10px;

}

.description {

margin-top: 18px;
max-width: 440px;
font-size: 16px;

}

.coming {

margin-top: 24px;
font-size: 22px;
font-weight: bold;

}

/* 💎 Glass Form */

.email-form {

margin-top: 26px;

background: rgba(255,255,255,0.1);

backdrop-filter: blur(12px);

-webkit-backdrop-filter: blur(12px);

border-radius: 14px;

padding: 24px;

box-shadow:
0 8px 32px rgba(0,0,0,0.25);

}

/* Input */

.email-form input {

padding: 12px;

width: 240px;

border-radius: 8px;

border: 1px solid rgba(255,255,255,0.3);

background: rgba(255,255,255,0.15);

color: white;

outline: none;

}

/* Button */

.email-form button {

margin-top: 14px;

padding: 12px 18px;

border-radius: 8px;

border: none;

background: linear-gradient(
45deg,
#ffffff,
#dcdcdc
);

color: #1A237E;

font-weight: bold;

cursor: pointer;

transition: 0.3s;

}

.email-form button:hover {

transform: scale(1.05);

box-shadow:
0 0 15px rgba(255,255,255,0.6);

}

/* Message */

.message {

margin-top: 12px;

font-size: 14px;

min-height: 18px;

}

/* Social */

.social {

margin-top: 26px;

}

.social a {

margin: 0 12px;

font-size: 22px;

color: white;

display: inline-block;

transition: 0.3s;

}

.social a:hover {

transform: translateY(-6px) scale(1.2);

color: #FFD700;

}

/* Footer */

.footer {

position: absolute;

bottom: 20px;

width: 100%;

text-align: center;

font-size: 13px;

line-height: 1.6;

}

.footer a {

color: white;

text-decoration: none;

margin: 0 6px;

}

.footer a:hover {

text-decoration: underline;

}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<img src="logo.png"
class="logo"
alt="Truvyo Logo">

<div class="title">
Truvyo
</div>

<div class="tagline">
Trust Built by People
</div>

<div class="description">
A human-verified platform where real people share trusted experiences and businesses earn credibility.
</div>

<div class="coming">
🚀 Coming Soon
</div>

<!-- Glass Form -->

<div class="email-form">

<form id="emailForm">

<input
type="email"
name="email"
placeholder="Enter your email"
required>

<br>

<button
type="submit"
id="submitBtn">

Notify Me

</button>

<div id="formMessage"
class="message"></div>

</form>

</div>
<script>

particlesJS("particles-js", {

particles: {

number: { value: 55 },

color: { value: "#ffffff" },

shape: { type: "circle" },

opacity: { value: 0.4 },

size: { value: 3 },

move: { enable: true, speed: 1 }

}

});

document
.getElementById("emailForm")
.addEventListener("submit",
async function(event) {

event.preventDefault();

var form = this;

var email =
form.querySelector(
'input[name="email"]').value;

var message =
document.getElementById("formMessage");

var button =
document.getElementById("submitBtn");

button.innerHTML =
"⏳ Please wait...";

button.disabled = true;

try {

/* Google Sheet */

var response =
await fetch("YOUR_NEW_DEPLOYMENT_URL_HERE", {

method: "POST",

body: new URLSearchParams({
email: email
})

});

var result =
await response.text();

/* Duplicate */

if (result === "Duplicate") {

message.innerHTML =
"⚠️ Email already registered!";

button.innerHTML =
"Notify Me";

button.disabled = false;

return;

}

/* Send to Formspree */

await fetch("https://formspree.io/f/xojywdpj", {

method: "POST",

headers: {
'Accept': 'application/json'
},

body: new FormData(form)

});

/* 🎉 Show Waitlist Number */

message.innerHTML =
"🎉 You're #" +
result +
" on the waitlist!";

gtag('event','email_signup');

/* Redirect */

setTimeout(function() {

window.location.href =
"/thankyou.html";

}, 1800);

}

catch(error) {

message.innerHTML =
"❌ Something went wrong";

button.innerHTML =
"Notify Me";

button.disabled = false;

}

});

</script>

<!-- Social -->

<div class="social">

<a href="https://instagram.com/truvyoapp" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://twitter.com/truvyo" target="_blank">
<i class="fab fa-x-twitter"></i>
</a>

<a href="https://linkedin.com/company/truvyo" target="_blank">
<i class="fab fa-linkedin"></i>
</a>

</div>

<!-- Footer -->

<div class="footer">

© 2026 Truvyo

<br>

<a href="/privacy.html">Privacy</a> |
<a href="/terms.html">Terms</a>

</div>

</div>

</body>

</html>
