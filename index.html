<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truvyo</title>
<meta name="description" content="Search before you trust.">

<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>

/* ===== BACKGROUND ===== */

body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
color: white;
overflow: hidden;

background:
radial-gradient(circle at 35% 38%, rgba(123, 63, 242, 0.28), transparent 34%),
radial-gradient(circle at 62% 36%, rgba(0, 220, 255, 0.18), transparent 30%),
linear-gradient(180deg, #14154a 0%, #24165e 50%, #121a45 100%);

background-size: 180% 180%;
animation: bgFlow 18s ease infinite;
}

@keyframes bgFlow {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

#particles-js {
position: fixed;
width: 100%;
height: 100%;
z-index: 1;
}

/* ===== LAYOUT ===== */

.container {
position: relative;
z-index: 2;

min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;

text-align: center;
padding: 20px;
}

/* ===== LOGO ===== */

.logo {
width: 90px;
margin-bottom: 6px;
animation: floatLogo 5s ease-in-out infinite;
}

@keyframes floatLogo {
0% { transform: translateY(0); }
50% { transform: translateY(-8px); }
100% { transform: translateY(0); }
}

/* ===== TITLE ===== */

.title {
font-size: clamp(36px, 5vw, 52px);
font-weight: 800;
letter-spacing: 1px;

background: linear-gradient(90deg,#fff,#bfa8ff,#8FEFFF,#fff);
background-size: 250%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;

animation: shine 6s linear infinite;
}

@keyframes shine {
0% { background-position: 0% }
100% { background-position: 250% }
}

/* ===== TAGLINE ===== */

.tagline {
font-size: 18px;
margin-top: 4px;
color: rgba(255,255,255,0.85);
}

/* ===== DESCRIPTION (INTRIGUE) ===== */

.description {
margin-top: 12px;
max-width: 420px;
font-size: 15px;
color: rgba(255,255,255,0.7);
line-height: 1.5;
}

/* ===== COMING ===== */

.coming {
margin-top: 20px;
font-size: 20px;
}

/* ===== WAITLIST ===== */

#waitlistCount {
margin-top: 6px;
font-size: 14px;
color: #8FEFFF;
}

/* ===== FORM ===== */

.email-form {
margin-top: 20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(18px);
border-radius: 18px;
padding: 24px;
border: 1px solid rgba(255,255,255,0.15);
}

.email-form input {
padding: 12px;
width: 240px;
border-radius: 10px;
border: none;
background: rgba(255,255,255,0.15);
color: white;
}

.email-form input::placeholder {
color: rgba(255,255,255,0.6);
}

.email-form button {
margin-top: 12px;
padding: 12px 20px;
border-radius: 10px;
border: none;
background: linear-gradient(45deg,#fff,#8FEFFF);
color: #111;
font-weight: bold;
cursor: pointer;
}

.message {
margin-top: 10px;
font-size: 14px;
}

/* ===== FOOTER ===== */

.footer {
margin-top: 20px;
font-size: 12px;
color: rgba(255,255,255,0.6);
}

.social-icons {
margin-top: 8px;
display: flex;
gap: 14px;
justify-content: center;
}

.social-icons a {
color: rgba(255,255,255,0.6);
transition: 0.3s;
}

.social-icons a:hover {
color: #8FEFFF;
transform: translateY(-3px);
}

</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">

<img src="logo.png" class="logo">

<div class="title">Truvyo</div>

<div class="tagline">Search before you trust.</div>

<div class="description">
Some people already search before they trust.
</div>

<div class="coming">🚀 Coming Soon</div>

<div id="waitlistCount">
Only 100 early access spots<br>
Loading...
</div>

<div class="email-form">

<form id="emailForm">

<input type="text" name="website" style="display:none">

<input type="email" name="email" placeholder="Get early access" required>

<br>

<button type="submit" id="submitBtn">Join Waitlist</button>

<div id="formMessage" class="message"></div>

</form>

</div>

<div class="footer">
© 2026 Truvyo

<div class="social-icons">
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-x-twitter"></i></a>
<a href="#"><i class="fab fa-linkedin"></i></a>
</div>

</div>

</div>

<script>

/* PARTICLES */

particlesJS("particles-js", {
particles: {
number: { value: 45 },
color: { value: "#ffffff" },
opacity: { value: 0.3 },
size: { value: 2 },
move: { enable: true, speed: 0.3 }
}
});

/* CONFIG */

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdzVEZEDKAm7EDCCE0iXCoR5ZEWtlFTNlfgtzMKLZaRrkPA3KSjQZp8Uom6swsr3LM/exec";
const MAX = 100;

/* LOAD COUNT */

async function loadCount(){
try{
let res = await fetch(SCRIPT_URL);
let count = await res.text();

if(!isNaN(count)){
document.getElementById("waitlistCount").innerHTML =
"Only 100 early access spots<br>" +
count + " already taken";
}
}catch{}
}

loadCount();

/* FORM */

document.getElementById("emailForm").addEventListener("submit", async function(e){

e.preventDefault();

let email = this.email.value;
let msg = document.getElementById("formMessage");
let btn = document.getElementById("submitBtn");

btn.innerHTML="⏳...";
btn.disabled=true;

try{

let res = await fetch(SCRIPT_URL,{
method:"POST",
body:new URLSearchParams({email})
});

let result = await res.text();

if(result==="Duplicate"){
msg.innerHTML="⚠️ Already in";
}else if(!isNaN(result)){
msg.innerHTML="🎉 You're in.";
}else{
msg.innerHTML="❌ Try again";
}

}catch{
msg.innerHTML="❌ Error";
}

btn.innerHTML="Join Waitlist";
btn.disabled=false;

});

</script>

</body>
</html>
