<!DOCTYPE html>
<html>
<head>
  <title>Open Truvyo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <script>
  window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    const reviewId = params.get("id");

    // Try opening app
    window.location.href = "truvyo://review?id=" + reviewId;

    // If app not installed → fallback
    setTimeout(function () {
      window.location.href = "https://truvyo.app"; // your coming soon page
    }, 1500);
  };
</script>
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">
  <h2>Opening Truvyo...</h2>
  <p>Review ID: <span id="reviewId"></span></p>
  <p>If the app does not open, you will be redirected.</p>
</body>
</html>
