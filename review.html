<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Truvyo</title>
  <meta name="description" content="Open a Truvyo review link in the app." />
  <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2" />
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png?v=2" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
  <link rel="manifest" href="/site.webmanifest?v=2" />
  <link rel="stylesheet" href="assets/truvyo.css" />

  <script>
    window.onload = function () {
      const params = new URLSearchParams(window.location.search);
      const reviewId = params.get("id");

      document.getElementById("reviewId").innerText = reviewId || "Not found";

      window.location.href = "truvyo://review?id=" + reviewId;

      setTimeout(function () {
        window.location.href = "https://truvyo.app";
      }, 3000);
    };
  </script>
</head>

<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="/" aria-label="Truvyo home">
        <span class="brand-mark"><img src="logo.png" alt="Truvyo logo" /></span>
        <span>
          <span class="wordmark">Truvyo</span>
          <span class="brand-line">Trust built by people</span>
        </span>
      </a>

      <nav class="site-nav" aria-label="Primary navigation">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="privacy.html">Privacy</a>
      </nav>
    </header>

    <main>
      <section class="glass-card center-card" aria-labelledby="open-title">
        <div class="status-icon" aria-hidden="true">↗</div>
        <div class="kicker">Review link</div>
        <h1 id="open-title">Opening Truvyo...</h1>
        <p class="hero-copy">Review ID: <span id="reviewId"></span></p>
        <p class="hero-copy">If the app does not open, you will be redirected.</p>
        <p style="margin-top: 28px;">
          <a class="button" href="/">Back to Home</a>
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <a href="privacy.html">PRIVACY</a>
      ·
      <a href="terms.html">TERMS</a>
      ·
      <a href="https://www.instagram.com/truvyoapp" aria-label="Truvyo on Instagram">INSTAGRAM</a>
      ·
      <a href="https://x.com/truvyo" aria-label="Truvyo on X">X</a>
      ·
      <a href="mailto:hello@truvyo.app">HELLO@TRUVYO.APP</a>
      <div class="footer-line">© 2026 Truvyo · Trust built by people.</div>
    </footer>
  </div>
</body>
</html>
